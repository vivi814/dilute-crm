<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dilute Studio</title>
<style>
:root{
  --bg:#F7F6F3;--white:#FFFFFF;--sidebar:#1C1C1E;--accent:#6C63FF;
  --accent2:#FF6584;--green:#16A34A;--text:#1C1C1E;--muted:#8E8E93;
  --border:#E5E5EA;--shadow:0 2px 12px rgba(0,0,0,0.07);--r:12px;--tr:6px;
  --font:'Segoe UI','PingFang TC','Microsoft JhengHei',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;}
#sidebar{width:210px;min-width:210px;background:var(--sidebar);display:flex;flex-direction:column;padding:20px 14px;gap:4px;color:#fff;overflow-y:auto;flex-shrink:0;}
.logo{padding:0 8px 18px;border-bottom:1px solid #333;margin-bottom:8px;}
.logo img{width:100%;max-width:160px;filter:invert(1);display:block;}
.sb-section{font-size:10px;font-weight:700;color:#555;letter-spacing:1.5px;text-transform:uppercase;padding:10px 8px 4px;}
.sb-btn{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:#aaa;border:none;background:none;width:100%;text-align:left;transition:all .15s;}
.sb-btn:hover{background:#2C2C2E;color:#fff;}
.sb-btn.active{background:var(--accent);color:#fff;font-weight:600;}
.rate-box{margin-top:auto;background:#2C2C2E;border-radius:10px;padding:12px;}
.rate-box label{font-size:10px;color:#777;display:block;margin-bottom:4px;}
.rate-box input{background:#3A3A3C;border:none;color:#fff;font-size:14px;font-weight:600;width:100%;padding:6px 8px;border-radius:6px;outline:none;}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#topbar{background:var(--white);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap;}
.page-tabs{display:flex;gap:2px;background:var(--bg);border-radius:8px;padding:3px;}
.ptab{padding:6px 12px;border-radius:6px;border:none;background:none;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);transition:all .15s;}
.ptab.active{background:var(--white);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.1);}
.search-box{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:6px 12px;flex:1;max-width:260px;}
.search-box input{border:none;background:none;outline:none;font-size:13px;width:100%;}
.view-toggle{display:flex;gap:4px;background:var(--bg);border-radius:8px;padding:3px;}
.vbtn{padding:5px 10px;border-radius:6px;border:none;background:none;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);}
.vbtn.active{background:var(--white);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.1);}
.add-btn{padding:7px 14px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}
.ml-auto{margin-left:auto;}
.chip{padding:4px 11px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--border);background:none;cursor:pointer;color:var(--muted);}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}
#season-chips-row{display:flex;gap:6px;flex-wrap:wrap;padding:8px 18px;border-bottom:1px solid var(--border);background:var(--white);}
#content{flex:1;overflow-y:auto;padding:20px;}

/* CARDS */
#card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;}
.item-card{background:var(--white);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;cursor:pointer;transition:transform .15s;}
.item-card:hover{transform:translateY(-2px);}
.card-thumb{height:140px;background:#F0EFFC;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.card-thumb img{width:100%;height:100%;object-fit:cover;}
.stage-badge{position:absolute;top:8px;right:8px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:var(--tr);}
.card-body{padding:11px;}
.card-code{font-size:10px;color:var(--muted);font-weight:600;margin-bottom:2px;}
.card-name{font-size:13px;font-weight:600;margin-bottom:6px;}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;}
.tag{font-size:10px;padding:2px 7px;border-radius:var(--tr);font-weight:600;}
.card-price{display:flex;justify-content:space-between;align-items:center;}
.price-twd{font-size:13px;font-weight:700;}

/* TIMELINE */
.tl-month{margin-bottom:24px;}
.tl-month-label{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.tl-month-label::after{content:'';flex:1;height:1px;background:var(--border);}
.tl-cards{display:flex;gap:10px;flex-wrap:wrap;}
.tl-card{background:var(--white);border-radius:10px;padding:13px;width:180px;cursor:pointer;box-shadow:var(--shadow);border-left:3px solid var(--accent);}
.tl-date{font-size:11px;color:var(--muted);margin-bottom:2px;}
.tl-name{font-size:13px;font-weight:600;}

/* TABLE */
.data-table{width:100%;border-collapse:collapse;background:var(--white);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);}
.data-table th{background:#F7F6F3;font-size:11px;font-weight:700;color:var(--muted);padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);}
.data-table td{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--border);}
.data-table tr:last-child td{border-bottom:none;}
.data-table tr:hover td{background:#F9F9FB;}

/* MODAL */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center;}
#modal-overlay.open{display:flex;}
#modal{background:var(--white);border-radius:16px;width:680px;max-width:96vw;max-height:92vh;overflow-y:auto;}
.modal-hd{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;position:sticky;top:0;background:var(--white);z-index:2;}
.modal-hd h2{font-size:16px;font-weight:700;flex:1;}
.modal-close{border:none;background:none;font-size:20px;cursor:pointer;color:var(--muted);}
.modal-body{padding:20px 22px;display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.modal-section-hd{grid-column:1/-1;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;padding-top:6px;border-top:1px solid var(--border);}
.modal-section-hd:first-child{border-top:none;padding-top:0;}
.field-group{display:flex;flex-direction:column;gap:4px;}
.field-group.full{grid-column:1/-1;}
.fl{font-size:11px;font-weight:700;color:var(--muted);}
.fi{padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font);outline:none;}
.fi:focus{border-color:var(--accent);}
.fi-sel{background:#FAFAFA;}
.modal-ft{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:center;position:sticky;bottom:0;background:var(--white);}
.btn-del{padding:8px 14px;border:1.5px solid #DC2626;border-radius:8px;background:none;color:#DC2626;cursor:pointer;font-size:13px;font-weight:600;}
.btn-cancel{padding:8px 14px;border:1.5px solid var(--border);border-radius:8px;background:none;cursor:pointer;font-size:13px;font-weight:600;margin-left:auto;}
.btn-save{padding:8px 20px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;}
.btn-sl{padding:8px 14px;border:1.5px solid var(--green);border-radius:8px;background:none;color:var(--green);cursor:pointer;font-size:13px;font-weight:600;}

/* IMG UPLOAD */
.img-upload-area{grid-column:1/-1;border:2px dashed var(--border);border-radius:10px;padding:14px;text-align:center;cursor:pointer;background:#FAFAFA;}
.img-upload-area:hover{border-color:var(--accent);}
.img-preview-strip{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.img-thumb-wrap{position:relative;display:inline-block;}
.img-thumb{width:68px;height:68px;border-radius:8px;object-fit:cover;border:1.5px solid var(--border);}
.img-thumb-del{position:absolute;top:-5px;right:-5px;width:17px;height:17px;border-radius:50%;background:#DC2626;color:#fff;border:none;cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;}

/* POPUP generic */
.popup-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.38);z-index:200;align-items:center;justify-content:center;}
.popup-overlay.open{display:flex;}
.popup-box{background:var(--white);border-radius:14px;padding:22px 24px;width:370px;max-height:85vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,0.18);}
.popup-title{font-size:15px;font-weight:700;margin-bottom:14px;}
.popup-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;max-height:220px;overflow-y:auto;}
.popup-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border-radius:8px;}
.popup-item-name{flex:1;font-size:13px;font-weight:600;}
.popup-item-code{font-size:11px;color:var(--muted);background:var(--border);padding:2px 6px;border-radius:4px;}
.popup-del{border:none;background:none;cursor:pointer;color:#DC2626;font-size:14px;}
.popup-divider{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin:10px 0 8px;padding-top:10px;border-top:1px solid var(--border);}
.popup-row{display:flex;flex-direction:column;gap:3px;margin-bottom:8px;}
.popup-label{font-size:11px;font-weight:700;color:var(--muted);}
.popup-inp{padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font);outline:none;width:100%;}
.popup-inp:focus{border-color:var(--accent);}
.popup-btns{display:flex;gap:8px;margin-top:10px;}
.popup-btn-cancel{flex:1;padding:8px;border:1.5px solid var(--border);border-radius:8px;background:none;cursor:pointer;font-size:13px;font-weight:600;font-family:var(--font);}
.popup-btn-save{flex:2;padding:8px;border:none;border-radius:8px;background:var(--accent);color:#fff;cursor:pointer;font-size:13px;font-weight:700;font-family:var(--font);}

/* SKU PAGE */
.sku-container{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:800px;margin:0 auto;}
.sku-result-box{background:var(--white);border-radius:var(--r);box-shadow:var(--shadow);padding:22px;display:flex;flex-direction:column;gap:12px;}
.sku-preview{font-size:26px;font-weight:800;letter-spacing:2px;color:var(--text);word-break:break-all;}
.sku-breakdown{display:flex;gap:6px;flex-wrap:wrap;}
.sku-part{display:inline-flex;flex-direction:column;align-items:center;padding:6px 10px;border-radius:8px;font-weight:700;font-size:13px;line-height:1.3;text-align:center;}
.sku-copy-btn{padding:10px;border:1.5px solid var(--accent);border-radius:8px;color:var(--accent);background:none;cursor:pointer;font-size:13px;font-weight:700;font-family:var(--font);}
.sku-apply-btn{padding:10px;background:var(--accent);border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:13px;font-weight:700;font-family:var(--font);}
.sku-form{background:var(--white);border-radius:var(--r);box-shadow:var(--shadow);padding:20px;display:flex;flex-direction:column;gap:14px;}
.sku-field label{font-size:11px;font-weight:700;color:var(--muted);display:block;margin-bottom:5px;}
.sku-select{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font);outline:none;background:#FAFAFA;}
.sku-select-row{display:flex;gap:6px;}
.sku-add-btn{padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;background:none;cursor:pointer;font-size:12px;font-weight:700;color:var(--muted);white-space:nowrap;}
.sku-add-btn:hover{border-color:var(--accent);color:var(--accent);}
.sku-sub{font-size:11px;color:var(--muted);margin-top:3px;}

/* COST PAGE */
.preset-tag{padding:5px 11px;border-radius:20px;border:1.5px solid var(--border);background:none;cursor:pointer;font-size:11px;font-weight:600;color:var(--muted);font-family:var(--font);white-space:nowrap;}
.preset-tag:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.cost-row-inp{border:none;outline:none;font-size:13px;font-family:var(--font);width:100%;background:transparent;}
.cost-cur-sel{border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:var(--font);padding:3px 4px;background:#FAFAFA;outline:none;}
.cost-del-btn{border:none;background:none;cursor:pointer;color:#DC2626;font-size:14px;}

/* QA POPUP */
#qa-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:300;align-items:center;justify-content:center;}
#qa-overlay.open{display:flex;}
#qa-box{background:var(--white);border-radius:14px;padding:22px 24px;width:360px;box-shadow:0 16px 48px rgba(0,0,0,0.18);}
.qa-title{font-size:15px;font-weight:700;margin-bottom:14px;}
.qa-row{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.qa-label{font-size:11px;font-weight:700;color:var(--muted);}
.qa-inp{padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font);outline:none;width:100%;}
.qa-inp:focus{border-color:var(--accent);}
.qa-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.qa-btns{display:flex;gap:8px;margin-top:14px;}
.qa-btn-cancel{flex:1;padding:9px;border:1.5px solid var(--border);border-radius:8px;background:none;cursor:pointer;font-size:13px;font-weight:600;font-family:var(--font);color:var(--muted);}
.qa-btn-add{flex:2;padding:9px;border:none;border-radius:8px;background:var(--accent);color:#fff;cursor:pointer;font-size:13px;font-weight:700;font-family:var(--font);}

/* INVENTORY */
.inv-stat-card{background:var(--white);border-radius:var(--r);box-shadow:var(--shadow);padding:16px 20px;}
.inv-stat-val{font-size:26px;font-weight:800;}
.inv-stat-lbl{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.inv-conn-row{display:flex;gap:10px;align-items:center;}
.inv-inp{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font);outline:none;flex:1;}
.inv-btn{padding:8px 16px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);}

/* SHOPLINE */
.sl-container{max-width:800px;margin:0 auto;}
.sl-section{background:var(--white);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden;}
.sl-section-hd{padding:13px 18px;font-size:13px;font-weight:700;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none;}
.sl-section-body{padding:16px 18px;display:grid;grid-template-columns:1fr 1fr;gap:12px;border-top:1px solid var(--border);}
.sl-field{display:flex;flex-direction:column;gap:4px;}
.sl-field.full{grid-column:1/-1;}
.sl-label{font-size:11px;font-weight:700;color:var(--muted);}
.sl-input{padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font);outline:none;width:100%;}
.sl-textarea{min-height:70px;resize:vertical;}
.sl-select{background:#FAFAFA;}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="logo"><img src="https://shoplineimg.com/5ebd5d42887c44004122cce7/6087bd4d38308a06225cc09c/1200x.png" alt="DILUTE"></div>
  <button class="sb-btn" onclick="showPage('kanban',document.querySelector('.ptab'))" style="background:var(--accent);color:#fff;font-weight:700;margin-bottom:4px">🗂 看板總覽</button>
  <div class="sb-section">分類篩選</div>
  <button class="sb-btn active" onclick="setSideFilter('all','',this)">📋 全部商品</button>
  <button class="sb-btn" onclick="setSideFilter('stage','設計中',this)">🎨 設計中</button>
  <button class="sb-btn" onclick="setSideFilter('stage','打樣中',this)">🔨 打樣中</button>
  <button class="sb-btn" onclick="setSideFilter('stage','生產中',this)">🏭 生產中</button>
  <button class="sb-btn" onclick="setSideFilter('stage','完成',this)">📦 完成</button>
  <button class="sb-btn" onclick="setSideFilter('stage','已上架',this)">🛍 已上架</button>
  <div class="sb-section">資料</div>
  <button class="sb-btn" onclick="exportData()">⬇ 資料檔案儲存</button>
  <label class="sb-btn" style="cursor:pointer">⬆ 資料檔案還原<input type="file" accept=".json" onchange="importData(event)" style="display:none"></label>
  <div class="rate-box">
    <label>匯率 CNY → TWD</label>
    <div style="display:flex;gap:6px;align-items:center">
      <input type="number" id="rate-input" value="4.62" step="0.01" oninput="renderOverview()" style="flex:1">
      <button onclick="fetchLiveRate()" id="rate-refresh-btn" title="抓取今日匯率" style="background:#3A3A3C;border:none;border-radius:6px;color:#aaa;cursor:pointer;padding:6px 8px;font-size:13px;flex-shrink:0">🔄</button>
    </div>
    <div id="rate-date" style="font-size:10px;color:#555;margin-top:3px"></div>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <!-- TOPBAR -->
  <div id="topbar">
    <div class="page-tabs">
      <button class="ptab" onclick="showPage('overview',this)">📋 商品列表</button>
      <button class="ptab" onclick="showPage('samplelist',this)">🧵 打樣總表</button>
      <button class="ptab" onclick="showPage('calendar',this)">📅 行事曆</button>
      <button class="ptab" onclick="showPage('cost',this)">🧵 輔料庫</button>
      <button class="ptab" onclick="showPage('sku',this)">🏷 貨號產生器</button>
      <button class="ptab" onclick="showPage('inventory',this)">📦 庫存盤點</button>
      <button class="ptab" onclick="showPage('lookbook',this)">📸 Lookbook</button>
      <button class="ptab" onclick="showPage('shopline',this)">🛍 ShopLine上架</button>
    </div>
    <div id="search-wrap" class="search-box"><span>🔍</span><input type="text" placeholder="搜尋商品…" oninput="renderOverview()" id="search-inp"></div>
    <div id="view-toggle" class="view-toggle">
      <button class="vbtn active" onclick="setView('grid',this)">⊞</button>
      <button class="vbtn" onclick="setView('table',this)">☰</button>
    </div>
    <span id="count-lbl" class="ml-auto" style="font-size:12px;color:var(--muted);white-space:nowrap;"></span>
    <button class="add-btn" id="add-item-btn" onclick="openModal()">＋ 新增商品</button>
  </div>

  <!-- LOW STOCK ALERT BAR -->
  <div id="low-stock-bar" style="display:none;background:#FEF3C7;border-bottom:1px solid #FCD34D;padding:8px 18px;font-size:12px;font-weight:600;color:#92400E;align-items:center;gap:8px;flex-wrap:wrap">
    <span>⚠ 輔料庫存警告：</span>
    <span id="low-stock-names"></span>
    <button onclick="currentMatCatId=null;showPage('cost',document.querySelectorAll('.ptab')[3])" style="margin-left:auto;padding:3px 10px;border:1.5px solid #92400E;border-radius:6px;background:none;color:#92400E;cursor:pointer;font-size:11px;font-weight:700;font-family:var(--font)">前往輔料庫 →</button>
  </div>

  <!-- SEASON CHIPS -->
  <div id="season-chips-row">
    <!-- rendered by renderSeasonChips() -->
  </div>
  <!-- CATEGORY CHIPS -->
  <div id="cat-chips-row" style="display:flex;gap:6px;flex-wrap:wrap;padding:6px 18px;border-bottom:1px solid var(--border);background:#FAFAFA;">
    <!-- rendered by renderCatChips() -->
  </div>

  <!-- CONTENT -->
  <div id="content">
    <div id="page-kanban"></div>
    <div id="page-overview" style="display:none"></div>
    <div id="page-cost" style="display:none"></div>
    <div id="page-sku" style="display:none"></div>
    <div id="page-shopline" style="display:none"></div>
    <div id="page-inventory" style="display:none"></div>
    <div id="page-samplelist" style="display:none"></div>
    <div id="page-calendar" style="display:none"></div>
    <div id="page-lookbook" style="display:none"></div>
  </div>
</div>

<!-- ═══ POPUPS ═══ -->

<!-- ITEM MODAL -->
<div id="modal-overlay" onclick="closeModalOutside(event)">
  <div id="modal">
    <div class="modal-hd">
      <h2 id="modal-title">新增商品</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-ft">

function getRate(){ return parseFloat(document.getElementById('rate-input').value)||4.62; }

function fetchLiveRate(){
  const btn=document.getElementById('rate-refresh-btn');
  const dateEl=document.getElementById('rate-date');
  if(btn) btn.textContent='⏳';
  // 使用台灣銀行牌告匯率資料（tw.rter.info）
  fetch('https://tw.rter.info/capi.php')
    .then(r=>r.json())
    .then(data=>{
      // CNYTWD = 人民幣對台幣
      const entry = data['CNYTWD'];
      const rate = entry && parseFloat(entry.Exrate);
      if(rate && rate>0){
        const inp=document.getElementById('rate-input');
        const today=new Date().toISOString().slice(0,10);
        if(inp){ inp.value=rate.toFixed(4); renderOverview(); }
        if(dateEl) dateEl.textContent='台灣銀行 今日匯率 '+today;
        if(btn) btn.textContent='✅';
        setTimeout(()=>{ if(btn) btn.textContent='🔄'; },2000);
        localStorage.setItem('dilute_rate',rate.toFixed(4));
        localStorage.setItem('dilute_rate_date',today);
      } else { throw new Error('no rate'); }
    })
    .catch(()=>{
      // fallback：用 exchangerate-api
      fetch('https://open.er-api.com/v6/latest/CNY')
        .then(r=>r.json())
        .then(d=>{
          const rate=d.rates&&d.rates.TWD;
          if(rate){
            const inp=document.getElementById('rate-input');
            const today=new Date().toISOString().slice(0,10);
            if(inp){ inp.value=rate.toFixed(4); renderOverview(); }
            if(dateEl) dateEl.textContent='參考匯率 '+today;
            if(btn) btn.textContent='✅';
            setTimeout(()=>{ if(btn) btn.textContent='🔄'; },2000);
            localStorage.setItem('dilute_rate',rate.toFixed(4));
            localStorage.setItem('dilute_rate_date',today);
          }
        })
        .catch(()=>{
          if(btn) btn.textContent='❌';
          if(dateEl) dateEl.textContent='無法取得匯率，請手動輸入';
          setTimeout(()=>{ if(btn) btn.textContent='🔄'; },2000);
        });
    });
}

    if(activeSeason && item.season!==activeSeason) return false;
    if(activeCat && item.category!==activeCat) return false;
    if(q && !item.name.toLowerCase().includes(q) && !(item.code||'').toLowerCase().includes(q)) return false;
    return true;
  });
}

function renderOverview(){
  const el = document.getElementById('page-overview');
  const list = getFilteredItems();
  document.getElementById('count-lbl').textContent = list.length+' 件';
  if(currentView==='grid') el.innerHTML = renderGrid(list);
  else if(currentView==='timeline') el.innerHTML = renderTimeline(list);
  else el.innerHTML = renderTable(list);
}

function renderTimeline(list){
  const byMonth={};
  list.forEach(item=>{

    (byMonth[key]=byMonth[key]||[]).push(item);
  });
  return Object.entries(byMonth).sort(([a],[b])=>a<b?-1:1).map(([month,its])=>`
    <div class="tl-month">
      <div class="tl-month-label">${month}</div>
      <div class="tl-cards">${its.map(item=>`
        <div class="tl-card" onclick="openModal(${item.id})" style="border-left-color:${stageText[item.stage]||'#6C63FF'}">

        </div>`).join('')}
      </div>
    </div>`).join('');
}

function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); }
function closeModalOutside(e){ if(e.target===document.getElementById('modal-overlay')) closeModal(); }
function updateCostPrev(){
  const cny=parseFloat(document.getElementById('f-cny')?.value)||0;
  const rate=getRate();
  const clothTwd=Math.round(cny*rate);
  const twdEl=document.getElementById('f-twdcost');
  if(twdEl) twdEl.value=clothTwd?'NT$ '+clothTwd.toLocaleString():'';

  // 工單成本（分打樣／大貨）
  // 大貨工單成本
  const itemWOs=workOrders.filter(w=>w.itemId===editingId);
  let woCostBulk=0;
  itemWOs.forEach(wo=>{
    (wo.lines||[]).forEach(l=>{
      const qty=parseFloat(l.qty)||0;
      const up=parseFloat(l.unitPrice)||0;
      woCostBulk+=(l.currency==='CNY'?qty*up*rate:qty*up);
    });
  });
  woCostBulk=Math.round(woCostBulk);

  // 打樣總費（從打樣紀錄加總）
  const currentItem=items.find(i=>i.id===editingId);
  const itemSamples=sampleRecords.filter(s=>s.itemName===(currentItem?.name||''));
  let woCostSample=0;
  itemSamples.forEach(s=>{
    const fee=parseFloat(s.fee)||0;
    const ship=parseFloat(s.shipping)||0;
    woCostSample+=(s.feeCur==='CNY'?fee*rate:fee)+(s.shipCur==='CNY'?ship*rate:ship);
  });
  woCostSample=Math.round(woCostSample);

  const woCostEl=document.getElementById('f-wo-cost');
  const woDetailEl=document.getElementById('f-wo-detail');
  if(woCostEl) woCostEl.textContent=woCostBulk>0?'NT$ '+woCostBulk.toLocaleString():'NT$ 0';
  if(woDetailEl) woDetailEl.innerHTML=`大貨工單：NT$ ${woCostBulk.toLocaleString()}<br><span style="color:#EA580C">打樣總費：NT$ ${woCostSample.toLocaleString()}（共${itemSamples.length}次，含運費）</span>`;

  // 平攤打樣費
  const deductRaw=parseFloat(document.getElementById('f-sample-deduct')?.value)||0;
  const deductCur=document.getElementById('f-deduct-cur')?.value||'TWD';
  const deduct=deductCur==='CNY'?Math.round(deductRaw*rate):deductRaw;
  const totalUnitsForSpread=Object.values(modalSizes).reduce((a,b)=>a+(parseInt(b)||0),0);
  const netSampleCost=Math.max(0,woCostSample-deduct);
  const spreadPerUnit=totalUnitsForSpread>0?Math.round(netSampleCost/totalUnitsForSpread):0;
  const spreadEl=document.getElementById('f-sample-spread');
  if(spreadEl){
    if(woCostSample>0&&totalUnitsForSpread>0){
      spreadEl.value=`NT$ ${spreadPerUnit.toLocaleString()}（打樣 ${woCostSample.toLocaleString()} - 折抵 ${deduct.toLocaleString()} ÷ ${totalUnitsForSpread}件）`;
    } else if(woCostSample>0){
      spreadEl.value=`打樣費 NT$ ${woCostSample.toLocaleString()}，待填大貨件數後自動平攤`;
    } else {
      spreadEl.value='尚無打樣工單';
    }
  }

  // 最終單件成本 = 衣服成本 + 大貨工單 + 平攤打樣
  const finalUnit=clothTwd+woCostBulk+spreadPerUnit;
  const finalEl=document.getElementById('f-final-cost');
  if(finalEl) finalEl.textContent=finalUnit>0?'NT$ '+finalUnit.toLocaleString():'—';

  // 件數合計
  const totalUnits=Object.values(modalSizes).reduce((a,b)=>a+(parseInt(b)||0),0);
  const totalCost=finalUnit*totalUnits;
  const price=parseFloat(document.getElementById('f-price')?.value)||0;
  const profit=price-finalUnit;
  const margin=price>0?Math.round(profit/price*100):0;

  const tcEl=document.getElementById('f-total-cost');
  if(tcEl) tcEl.textContent=totalUnits>0&&finalUnit>0?'NT$ '+totalCost.toLocaleString():'—';
  const prEl=document.getElementById('f-profit');
  if(prEl) prEl.textContent=price&&finalUnit?(profit>=0?'NT$ ':'- NT$ ')+Math.abs(profit).toLocaleString():'—';
  const mgEl=document.getElementById('f-margin');
  if(mgEl) mgEl.textContent=price&&finalUnit?margin+'%':'—';
}

function initModalSizes(sizes){
  modalSizes={...sizes};
  DEFAULT_SIZES.forEach(s=>{if(!(s in modalSizes)) modalSizes[s]=0;});
}
function buildSizeInputsHtml(){
  return Object.entries(modalSizes).map(([sz,qty])=>`
    <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
      <div style="font-size:10px;font-weight:700;color:var(--muted)">${sz}</div>
      <input type="number" value="${qty}" min="0" style="width:52px;padding:5px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;text-align:center;outline:none;font-family:var(--font)"
        oninput="modalSizes['${sz}']=parseInt(this.value)||0;calcSizeTotal();updateCostPrev()">
    </div>`).join('');
}
function addSizeField(){
  const inp=document.getElementById('f-new-size');
  const sz=inp.value.trim();
  if(!sz||sz in modalSizes)return;
  modalSizes[sz]=0;
  inp.value='';
  document.getElementById('f-sizes-wrap').innerHTML=buildSizeInputsHtml();
  calcSizeTotal();
}
function calcSizeTotal(){
  const total=Object.values(modalSizes).reduce((a,b)=>a+(parseInt(b)||0),0);
  const el=document.getElementById('f-size-total');
  if(el) el.textContent=total;
}
function collectSizes(){
  const out={};
  Object.keys(modalSizes).forEach(sz=>{
    const v=parseInt(modalSizes[sz])||0;
    if(v>0) out[sz]=v;
  });
  return out;
}

function handleImgUpload(e){
  const files=Array.from(e.target.files);
  const rem=12-modalImages.length;
  files.slice(0,rem).forEach(f=>{
    const reader=new FileReader();
    reader.onload=ev=>{ modalImages.push(ev.target.result); refreshImgPreview(); };
    reader.readAsDataURL(f);
  });
  e.target.value='';
}
function refreshImgPreview(){

  if(!el)return;
  el.innerHTML=modalImages.map((src,i)=>`

}
function removeImg(i,e){ e.stopPropagation(); modalImages.splice(i,1); refreshImgPreview(); }

  document.getElementById('ep-title').textContent=titles[type]||'管理';
  document.getElementById('ep-name-label').textContent=namels[type]||'名稱';
  document.getElementById('ep-code-label').textContent=codels[type]||'代號';

  renderEntityList();
  document.getElementById('entity-popup').classList.add('open');

function closeEntityPopup(){ document.getElementById('entity-popup').classList.remove('open'); }
function getEntityArr(){
  return {color:skuColors,supplier:skuSuppliers,designer:skuDesigners,year:skuYears,season:skuSeasons,cat:CATS}[entityType]||[];
}
function renderEntityList(){
  const arr=getEntityArr();
  document.getElementById('ep-list').innerHTML=arr.length===0
    ?'<div style="color:var(--muted);font-size:13px;padding:6px 0">尚無項目</div>'
    :arr.map((e,i)=>`
      <div class="popup-item">
        ${typeof e==='string'
          ?`<span class="popup-item-name">${e}</span>`
          :`<span class="popup-item-name">${e.name}</span><span class="popup-item-code">${e.code}</span>`}
        <button class="popup-del" onclick="deleteEntity(${i})">✕</button>
      </div>`).join('');
}
function deleteEntity(i){
  const arr=getEntityArr();
  if(arr.length<=1){alert('至少保留一個項目');return;}
  arr.splice(i,1);
  renderEntityList();
  refreshEntitySelects();
  saveData(); pushConfigToBackend();
}
function saveEntity(){
  const name=document.getElementById('ep-name').value.trim();
  if(!name){alert('請填寫名稱');return;}
  const rawCode=document.getElementById('ep-code').value.trim();
  const isNum=(entityType==='season'||entityType==='year');
  const code=isNum?rawCode.padStart(2,'0'):rawCode.toUpperCase();
  if(!code){alert('請填寫代號');return;}
  const arr=getEntityArr();
  if(arr.some(e=>e.name===name)){alert('已存在');return;}
  arr.push({name,code});
  document.getElementById('ep-name').value='';
  document.getElementById('ep-code').value='';
  renderEntityList();
  refreshEntitySelects();
  saveData();
}
function refreshEntitySelects(){
  // refresh modal selects if open
  const supSel=document.getElementById('f-supplier');
  if(supSel){
    const cur=supSel.value;
    supSel.innerHTML='<option value="">— 請選擇 —</option>'+skuSuppliers.map(s=>`<option value="${s.name}" ${s.name===cur?'selected':''}>${s.name} (${s.code})</option>`).join('');
  }
  const desSel=document.getElementById('f-designer');
  if(desSel){
    const cur=desSel.value;
    desSel.innerHTML='<option value="">— 請選擇 —</option>'+skuDesigners.map(d=>`<option value="${d.name}" ${d.name===cur?'selected':''}>${d.name} (${d.code})</option>`).join('');
  }
  const catSel=document.getElementById('f-cat');
  if(catSel){ const cur=catSel.value; catSel.innerHTML=CATS.map(c=>`<option value="${c.name}" ${c.name===cur?'selected':''}>${c.name} (${c.code})</option>`).join(''); }
  // refresh category chips
  if(!CATS.some(c=>c.name===activeCat)) activeCat='';
  renderCatChips();
  // refresh sku page if visible
  if(currentPage==='sku') populateSkuSelects();
}

  document.getElementById('page-sku').innerHTML=`

function populateSkuSelects(){
  function fill(id,arr){
    const sel=document.getElementById(id);
    if(!sel)return;
    const cur=sel.value;
    sel.innerHTML=arr.map((e,i)=>`<option value="${i}">${e.code} ${e.name}</option>`).join('');
    if(cur) sel.value=cur;
  }
  fill('sku-year',skuYears);
  fill('sku-cat',CATS);
  fill('sku-color',skuColors);
  // default year to '26'
  const sel=document.getElementById('sku-year');
  if(sel&&sel.value==='0'){
    const di=skuYears.findIndex(y=>y.code==='26');
    if(di>=0) sel.value=di;
  }
}

function buildSku(){
  const yi=parseInt(document.getElementById('sku-year')?.value);
  const cati=parseInt(document.getElementById('sku-cat')?.value);
  const ci=parseInt(document.getElementById('sku-color')?.value);
  const suffix=(document.getElementById('sku-seq')?.value||'').trim();
  if(isNaN(yi)||isNaN(cati)||isNaN(ci)){const p=document.getElementById('sku-preview');if(p)p.textContent='—';return;}
  const year=skuYears[yi];const cat=CATS[cati];const color=skuColors[ci];
  const code=suffix?`${year.code}${cat.code}${color.code}-${suffix}`:`${year.code}${cat.code}${color.code}`;
  const prev=document.getElementById('sku-preview');if(prev)prev.textContent=code;
  const parts=[
    {label:year.code,desc:'年份',bg:'#EEF2FF',tc:'#4F46E5'},
    {label:`${cat.code} ${cat.name}`,desc:'類別',bg:'#FFF7ED',tc:'#EA580C'},
    {label:color.code,desc:'顏色',bg:'#F0FDF4',tc:'#16A34A'},
  ];
  if(suffix) parts.push({label:'-'+suffix,desc:'後綴',bg:'#FFF9C4',tc:'#854D0E'});
  const bd=document.getElementById('sku-breakdown');
  if(bd) bd.innerHTML=parts.map(p=>`<span class="sku-part" style="background:${p.bg};color:${p.tc}">${p.label}<br><small style="font-weight:400;font-size:10px">${p.desc}</small></span>`).join('');
  const cs2=document.getElementById('sku-cat-sub');if(cs2)cs2.textContent=`類別代號：${cat.code}（${cat.name}）`;
  const cs=document.getElementById('sku-color-sub');if(cs)cs.textContent=`顏色代號：${color.code}`;
}

function copySkuCode(){
  const code=document.getElementById('sku-preview')?.textContent;
  if(!code||code==='—')return;
  navigator.clipboard.writeText(code).then(()=>{
    const btn=event.target;btn.textContent='✅ 已複製！';setTimeout(()=>btn.textContent='複製貨號',1500);
  });
}
function applySkuToNew(){
  const code=document.getElementById('sku-preview')?.textContent;
  if(!code||code==='—')return;
  showPage('overview',document.querySelectorAll('.ptab')[0]);
  setTimeout(()=>{openModal();document.getElementById('f-code').value=code;},60);
}

function drillMatCat(catId){
  currentMatCatId=catId;

function renderMatCatDrilldown(catId){
  const cat=matCategories.find(c=>c.id===catId); if(!cat)return;
  const el=document.getElementById('page-cost');
  const items=materialLib.filter(m=>(m.categoryId===catId)||(m.category===cat.name));
  const rate=getRate();

  // 計算總花費（全換算台幣）
  const totalTwd=items.reduce((sum,m)=>{
    const price=matUnitPrice(m)||0;
    const stock=m.totalStock||0;
    const twd=m.currency==='CNY'?Math.round(price*stock*rate):price*stock;
    return sum+twd;
  },0);
  const lowItems=items.filter(m=>m.totalStock>0&&matRemaining(m)<=(m.minStock||0));

  // 各項小計
  const itemSummary=items.filter(m=>m.totalStock>0).map(m=>{
    const price=matUnitPrice(m)||0;
    const stock=m.totalStock||0;
    const twd=m.currency==='CNY'?Math.round(price*stock*rate):price*stock;
    return`<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px solid #F0F0F0">
      <span>${m.name} × ${stock} ${m.unit||'個'}</span>
      <span style="font-weight:600;color:var(--text)">NT$ ${twd.toLocaleString()}</span>
    </div>`;

  el.innerHTML=`

      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">

        <button class="add-btn" style="margin-left:auto" onclick="openMatPopup(${catId})">＋ 新增品項</button>
      </div>

      <!-- 總費用 summary -->
      <div style="background:#fff;border-radius:var(--r);box-shadow:var(--shadow);padding:16px 20px;margin-bottom:14px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start">
        <div>
          <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">此分類採購總花費</div>
          <div style="font-size:28px;font-weight:800;color:var(--accent)">NT$ ${totalTwd.toLocaleString()}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">${items.length} 個品項，${items.filter(m=>m.totalStock>0).length} 項有庫存</div>
          ${lowItems.length?`<div style="margin-top:6px;font-size:12px;font-weight:600;color:#DC2626">⚠ ${lowItems.map(m=>m.name).join('、')} 庫存不足</div>`:''}
        </div>
        ${itemSummary?`<div style="background:#F7F6F3;border-radius:10px;padding:10px 14px;min-width:200px;max-height:160px;overflow-y:auto">
          <div style="font-size:10px;font-weight:700;color:var(--muted);margin-bottom:6px">費用明細</div>
          ${itemSummary}
          <div style="display:flex;justify-content:space-between;font-size:12px;font-weight:800;padding-top:5px;margin-top:2px;color:var(--accent)">
            <span>合計</span><span>NT$ ${totalTwd.toLocaleString()}</span>

        <div id="mat-lib-body"></div>
      </div>
    </div>`;
  renderMatLib(catId);

// Material Lib
function matUnitCost(m){ return (m.qty&&m.price)?(m.price/m.qty):0; }
function matUnitPrice(m){ return m.unitPrice||(m.qty&&m.price?m.price/m.qty:0); }
function matUsedQty(m){
  let used=0;
  workOrders.forEach(wo=>(wo.lines||[]).forEach(l=>{ if(l.libId===m.id) used+=parseFloat(l.qty)||0; }));
  return used;
}
function matRemaining(m){ return (m.totalStock||0)-matUsedQty(m); }

function renderMatLib(catId){
  const el=document.getElementById('mat-lib-body');
  if(!el)return;
  const cat=catId!=null?matCategories.find(c=>c.id===catId):null;
  const filtered=catId!=null?materialLib.filter(m=>(m.categoryId===catId)||(cat&&m.category===cat.name)):materialLib;
  if(!filtered.length){
    el.innerHTML='<div style="padding:40px;font-size:13px;color:var(--muted);text-align:center">此分類尚無品項，點右上角「新增品項」建立</div>';
    return;
  }
  el.innerHTML= `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;padding:16px">
    ${filtered.map(m=>{
      const up=matUnitPrice(m); const sym=m.currency==='CNY'?'¥':'NT$';
      const remaining=matRemaining(m);
      const hasStock=m.totalStock>0;
      const isLow=hasStock&&remaining<=(m.minStock||0);
      const stockColor=isLow?'#DC2626':remaining>0?'#16A34A':'var(--muted)';
      const stockBg=isLow?'#FEE2E2':remaining>0?'#D1FAE5':'#F3F4F6';
      return`<div style="background:#fff;border-radius:12px;box-shadow:var(--shadow);overflow:hidden;cursor:pointer;border:2px solid ${isLow?'#FCA5A5':'transparent'}" onclick="openMatEdit(${m.id})">
        <div style="height:110px;background:#F0EFFC;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative">
          ${m.image?`<img src="${m.image}" style="width:100%;height:100%;object-fit:cover">`:`<span style="font-size:32px;color:#ddd">🧵</span>`}
          ${isLow?`<div style="position:absolute;top:6px;right:6px;background:#DC2626;color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px">⚠ 庫存低</div>`:''}
        </div>
        <div style="padding:10px 12px">
          <div style="font-size:13px;font-weight:700;margin-bottom:4px">${m.name}</div>
          <div style="font-size:12px;color:var(--green);font-weight:700">${sym}${up%1===0?up:up.toFixed(2)} / ${m.unit||'個'}</div>
          ${hasStock?`<div style="margin-top:6px;display:flex;align-items:center;justify-content:space-between">
            <span style="font-size:11px;color:var(--muted)">庫存</span>
            <span style="font-size:12px;font-weight:700;color:${stockColor};background:${stockBg};padding:2px 8px;border-radius:10px">${remaining} ${m.unit||'個'}</span>
          </div>`:''}
          ${m.notes?`<div style="font-size:11px;color:var(--muted);margin-top:4px">${m.notes}</div>`:''}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function addCostRow(name='',qty=1,price='',currency='CNY',note=''){

function renderCostRows(){
  const tbody=document.getElementById('cost-rows');
  if(!tbody)return;
  tbody.innerHTML=costRows.map(row=>`
    <tr style="border-bottom:1px solid var(--border)">
      <td style="padding:7px 12px"><input class="cost-row-inp" id="cr-name-${row.id}" value="${row.name}" placeholder="項目名稱" oninput="updateCostSummary()"></td>
      <td style="padding:7px 8px"><input class="cost-row-inp" id="cr-qty-${row.id}" type="number" value="${row.qty}" min="1" style="width:52px;text-align:center" oninput="updateCostSummary()"></td>
      <td style="padding:7px 8px"><input class="cost-row-inp" id="cr-price-${row.id}" type="number" value="${row.price}" placeholder="0" style="text-align:right" oninput="updateCostSummary()"></td>
      <td style="padding:7px 6px"><select class="cost-cur-sel" id="cr-cur-${row.id}" onchange="updateCostSummary()"><option value="CNY" ${row.currency==='CNY'?'selected':''}>¥</option><option value="TWD" ${row.currency==='TWD'?'selected':''}>NT$</option></select></td>
      <td style="padding:7px 8px;text-align:right;font-weight:700;font-size:13px" id="cr-sub-${row.id}">—</td>
      <td style="padding:7px 8px"><input class="cost-row-inp" id="cr-note-${row.id}" value="${row.note}" placeholder="備註" oninput="updateCostSummary()"></td>
      <td style="padding:7px 6px"><button class="cost-del-btn" onclick="deleteCostRow(${row.id})">✕</button></td>
    </tr>`).join('');
  updateCostSummary();
}
function updateCostSummary(){
  const rate=getRate(); let total=0; const barData=[];
  costRows.forEach(row=>{
    const qty=parseFloat(document.getElementById(`cr-qty-${row.id}`)?.value)||0;
    const price=parseFloat(document.getElementById(`cr-price-${row.id}`)?.value)||0;
    const cur=document.getElementById(`cr-cur-${row.id}`)?.value||'CNY';
    const name=document.getElementById(`cr-name-${row.id}`)?.value||'項目';
    const sub=cur==='CNY'?qty*price*rate:qty*price;
    total+=sub;
    const subEl=document.getElementById(`cr-sub-${row.id}`);
    if(subEl)subEl.textContent=sub>0?'NT$ '+Math.round(sub).toLocaleString():'—';
    if(sub>0)barData.push({name,sub});
  });
  const tw=document.getElementById('cost-total-twd');if(tw)tw.textContent='NT$ '+Math.round(total).toLocaleString();
  const cn=document.getElementById('cost-total-cny');if(cn)cn.textContent=`約 ¥ ${Math.round(total/rate).toLocaleString()}`;
  const barsEl=document.getElementById('cost-breakdown-bars');
  if(barsEl&&barData.length>0){
    const cols=['#6C63FF','#FF6584','#43BCCD','#F7B731','#20BF6B','#FC5C65','#A29BFE'];
    barsEl.innerHTML=barData.map((d,i)=>{
      const pct=total>0?Math.round(d.sub/total*100):0;
      return`<div><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px"><span style="font-weight:600">${d.name}</span><span>NT$ ${Math.round(d.sub).toLocaleString()} (${pct}%)</span></div><div style="height:6px;background:#F0F0F0;border-radius:3px"><div style="height:6px;background:${cols[i%cols.length]};border-radius:3px;width:${pct}%"></div></div></div>`;
    }).join('');
  } else if(barsEl) barsEl.innerHTML='';
  const sell=parseFloat(document.getElementById('cost-sell-price')?.value)||0;
  const profit=document.getElementById('cost-profit');const margin=document.getElementById('cost-margin');const ratio=document.getElementById('cost-ratio');
  if(sell>0){
    const gp=sell-total;const mr=sell>0?Math.round(gp/sell*100):0;const cr=sell>0?Math.round(total/sell*100):0;
    if(profit)profit.textContent=(gp>=0?'NT$ ':'- NT$ ')+Math.abs(Math.round(gp)).toLocaleString();
    if(margin)margin.textContent=mr+'%';
    if(ratio)ratio.textContent=cr+'%';
  } else {
    if(profit)profit.textContent='—';if(margin)margin.textContent='—';if(ratio)ratio.textContent='—';
  }
}

// backend URL (persisted separately so it survives data resets)
// Auto-detect: if served from Railway, use same origin as backend
const _selfOrigin = (location.hostname !== 'localhost' && location.hostname !== '127.0.0.1' && !location.protocol.startsWith('file'))
  ? location.origin   // served from Railway → use same domain
  : '';
let backendUrl = localStorage.getItem('dilute_backend_url') || _selfOrigin;

function connectBackend(){
  const urlEl=document.getElementById('inv-url');
  const url=(urlEl?.value||backendUrl).trim();
  if(!url){alert('請輸入後端網址');return;}
  backendUrl=url;
  localStorage.setItem('dilute_backend_url',url);
  if(ws){ws.close();}
  const wsUrl=url.replace(/^https/,'wss').replace(/^http/,'ws');
  const setStatus=(msg,color)=>{ const s=document.getElementById('inv-status');if(s){s.textContent=msg;s.style.color=color||'var(--muted)';} };
  try{
    ws=new WebSocket(wsUrl);
    ws.onopen=()=>{ setStatus('✅ 已連接後端，商品資料同步中…','#16A34A'); };
    ws.onmessage=e=>{ try{handleWsMessage(JSON.parse(e.data));}catch{} };
    ws.onclose=()=>{ setStatus('⚠ 連線中斷，重新整理頁面後會自動重連','#EA580C'); };
    ws.onerror=()=>{ setStatus('❌ 連線失敗，請確認網址是否正確','#DC2626'); };
  }catch(e){ setStatus('❌ '+e.message,'#DC2626'); }
}

function handleWsMessage(msg){
  if(msg.type==='snapshot'||msg.type==='sync_done'){
    // inventory / orders
    if(msg.payload.inventory) invData=msg.payload.inventory;
    if(msg.payload.orders)    ordersData=msg.payload.orders;
    if(msg.payload.returns)   returnsData=msg.payload.returns;
    renderInvTable(); updateInvStats(msg.payload.stats);
    // product data from backend (overrides localStorage)
    if(msg.payload.items && msg.payload.items.length>0){
      items = msg.payload.items;
      const maxId = Math.max(...items.map(i=>i.id||0));
      if(maxId>=nextId) nextId=maxId+1;
    }
    if(msg.payload.config){
      const cfg=msg.payload.config;
      if(cfg.SEASONS)      SEASONS      = cfg.SEASONS;
      if(cfg.CATS)         CATS         = cfg.CATS;
      if(cfg.skuColors)    skuColors    = cfg.skuColors;
      if(cfg.skuSuppliers) skuSuppliers = cfg.skuSuppliers;
      if(cfg.skuDesigners) skuDesigners = cfg.skuDesigners;
      if(cfg.skuYears)     skuYears     = cfg.skuYears;
      if(cfg.skuSeasons)   skuSeasons   = cfg.skuSeasons;
      if(cfg.staffList)    staffList    = cfg.staffList;
      if(cfg.costPresets)  costPresets  = cfg.costPresets;
      if(cfg.materialLib)   materialLib   = cfg.materialLib;
      if(cfg.matCategories) matCategories = cfg.matCategories;
      if(cfg.matCatId)      matCatId      = cfg.matCatId;
    }
    if(currentPage==='overview'){ renderSeasonChips();renderCatChips();renderOverview(); }
    updateLowStockBar();
    const s=document.getElementById('inv-status');
    if(s){s.textContent='✅ 已連接，資料已同步（'+new Date().toLocaleTimeString()+'）';s.style.color='#16A34A';}
  }
  if(msg.type==='item_update'){
    const {item,id,action}=msg.payload;
    if(action==='delete') items=items.filter(i=>i.id!==id);
    else if(item){ const idx=items.findIndex(i=>i.id===item.id); if(idx>=0)items[idx]=item;else items.push(item); }
    if(currentPage==='overview') renderOverview();
  }
  if(msg.type==='config_update'){
    const cfg=msg.payload;
    if(cfg.SEASONS)SEASONS=cfg.SEASONS;if(cfg.CATS)CATS=cfg.CATS;
    if(cfg.skuColors)skuColors=cfg.skuColors;if(cfg.skuSuppliers)skuSuppliers=cfg.skuSuppliers;
    if(cfg.skuDesigners)skuDesigners=cfg.skuDesigners;if(cfg.staffList)staffList=cfg.staffList;
    if(cfg.costPresets)costPresets=cfg.costPresets;if(cfg.materialLib)materialLib=cfg.materialLib;
    if(cfg.matCategories)matCategories=cfg.matCategories;if(cfg.matCatId)matCatId=cfg.matCatId;
    if(currentPage==='overview'){renderSeasonChips();renderCatChips();renderOverview();}
  }
  if(msg.type==='inventory_update'&&msg.payload.inventory){ invData=msg.payload.inventory; renderInvTable(); }
  if(msg.type==='order_update'){ if(msg.payload.stats)updateInvStats(msg.payload.stats); }
  if(msg.type==='sync_progress'){ const s=document.getElementById('inv-status');if(s)s.textContent='🔄 '+msg.payload.message; }
}

function updateInvStats(stats){
  if(!stats)return;
  const o=stats.orders||{};const r=stats.returns||{};
  const setStat=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  setStat('inv-stat-orders',o.today_count||0);
  setStat('inv-stat-revenue',o.today_revenue?'NT$'+(o.today_revenue).toLocaleString():'—');
  setStat('inv-stat-returns',r.today_count||0);
  setStat('inv-stat-sku',invData.length||'—');
}

function renderInvTable(){

function triggerSync(){

const STORE_KEY = 'dilute_studio_v1';

function exportData(){
  const data = JSON.stringify({

  a.download = 'dilute-backup-' + new Date().toISOString().slice(0,10) + '.json';

function importData(e){
  const file = e.target.files[0];
  if(!file) return;
  if(!confirm('匯入後會覆蓋現有資料，確定嗎？')) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if(d.items)        items        = d.items;
      if(d.nextId)       nextId       = d.nextId;
      if(d.SEASONS)      SEASONS      = d.SEASONS;
      if(d.CATS)         CATS         = d.CATS;
      if(d.skuColors)    skuColors    = d.skuColors;
      if(d.skuSuppliers) skuSuppliers = d.skuSuppliers;
      if(d.skuDesigners) skuDesigners = d.skuDesigners;
      if(d.skuSeasons)   skuSeasons   = d.skuSeasons;
      if(d.skuYears)     skuYears     = d.skuYears;
      if(d.staffList)    staffList    = d.staffList;
      if(d.costPresets)  costPresets  = d.costPresets;
      if(d.materialLib)  materialLib  = d.materialLib;
      if(d.matLibId)     matLibId     = d.matLibId;
      if(d.matCategories)matCategories= d.matCategories;
      if(d.matCatId)     matCatId     = d.matCatId;
      if(d.sampleRecords)sampleRecords= d.sampleRecords;
      if(d.sampleId)     sampleId     = d.sampleId;
      if(d.workOrders)   workOrders   = d.workOrders;
      if(d.workOrderId)  workOrderId  = d.workOrderId;
      if(d.woLineId)     woLineId     = d.woLineId;
      if(d.fabrics)      fabrics      = d.fabrics;
      if(d.fabricId)     fabricId     = d.fabricId;
      if(d.lookbookItems)lookbookItems= d.lookbookItems;
      if(d.lookbookId)   lookbookId   = d.lookbookId;

      // 儲存到 localStorage + 同步到後端
      saveData();
      // 把每個商品推到後端
      if(backendUrl){ items.forEach(item=>pushItemToBackend(item)); pushConfigToBackend(); }
      updateLowStockBar();
      renderSeasonChips(); renderCatChips(); renderOverview();
      alert('✅ 匯入成功！資料已同步到後端。');
    } catch(err){ alert('檔案格式錯誤，請確認是正確的備份檔'); }
  };
  reader.readAsText(file);
  e.target.value='';
}

function saveData(){
  // always save to localStorage as backup
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify({
      items, nextId,
      SEASONS, CATS,
      skuColors, skuSuppliers, skuDesigners, skuSeasons, skuYears,
      staffList, costPresets, materialLib, matLibId, matCategories, matCatId,
      sampleRecords, sampleId,
      workOrders, workOrderId, woLineId,
      fabrics, fabricId, lookbookItems, lookbookId,
    }));
  } catch(e){ console.warn('localStorage 儲存失敗', e); }
  updateLowStockBar();
}

function handleSampleImgUpload(e){
  const files=Array.from(e.target.files);
  const rem=6-sampleModalImages.length;
  files.slice(0,rem).forEach(f=>{
    const reader=new FileReader();
    reader.onload=ev=>{ sampleModalImages.push(ev.target.result); renderSampleImgPreview(); };
    reader.readAsDataURL(f);
  });
  e.target.value='';
}

      <thead><tr><th>版次</th><th>狀態</th><th>送樣日</th><th>回樣日</th><th style="text-align:right">打樣費</th><th style="text-align:right">運費</th><th>備註</th><th>照片</th></tr></thead>

function closeSampleReadonlyPanel(){ document.getElementById('sample-readonly-overlay')?.remove(); }
function updateSmSubtotal(){
  const rate=getRate();
  const fee=parseFloat(document.getElementById('sm-fee')?.value)||0;
  const feeCur=document.getElementById('sm-fee-cur')?.value||'TWD';
  const ship=parseFloat(document.getElementById('sm-shipping')?.value)||0;
  const shipCur=document.getElementById('sm-ship-cur')?.value||'TWD';
  const feeTwd=feeCur==='CNY'?Math.round(fee*rate):fee;
  const shipTwd=shipCur==='CNY'?Math.round(ship*rate):ship;
  const feeConv=document.getElementById('sm-fee-convert');
  const shipConv=document.getElementById('sm-ship-convert');
  if(feeConv) feeConv.textContent=feeCur==='CNY'&&fee>0?`≈ NT$ ${feeTwd.toLocaleString()}`:'';
  if(shipConv) shipConv.textContent=shipCur==='CNY'&&ship>0?`≈ NT$ ${shipTwd.toLocaleString()}`:'';
  const el=document.getElementById('sm-subtotal');
  if(el) el.textContent='NT$ '+(feeTwd+shipTwd).toLocaleString();
}
function saveSample(){
  const rec={
    id:editingSampleId||sampleId++,
    itemName:document.getElementById('sm-item').value,
    version:parseInt(document.getElementById('sm-ver').value)||1,
    stage:document.getElementById('sm-stage').value,
    owner:document.getElementById('sm-owner').value,
    sentDate:document.getElementById('sm-sent').value,
    returnDate:document.getElementById('sm-return').value,
    fee:parseFloat(document.getElementById('sm-fee').value)||0,
    feeCur:document.getElementById('sm-fee-cur').value||'TWD',
    shipping:parseFloat(document.getElementById('sm-shipping').value)||0,
    shipCur:document.getElementById('sm-ship-cur').value||'TWD',
    notes:document.getElementById('sm-notes').value,
    pendingMonth:document.getElementById('sm-pending-month')?.value||'',
    images:[...sampleModalImages],
  };
  if(editingSampleId) sampleRecords[sampleRecords.findIndex(x=>x.id===editingSampleId)]=rec;
  else sampleRecords.push(rec);

  // 自動更新商品階段
  const linkedItem = items.find(i=>i.name===rec.itemName);
  if(linkedItem){
    const stageMap = {
      '待打樣':'打樣中','打樣中':'打樣中','修改中':'打樣中',
      '確認OK':'打樣中','暫定':'打樣中',
      '確認下大貨':'生產中',
    };
    const newStage = stageMap[rec.stage];
    if(newStage && linkedItem.stage !== newStage){
      linkedItem.stage = newStage;
    } else if(rec.stage==='確認取消' && linkedItem.stage!=='完成' && linkedItem.stage!=='已上架'){
      if(confirm(`打樣已確認取消，要將「${linkedItem.name}」從商品列表移除嗎？`)){
        items = items.filter(i=>i.id!==linkedItem.id);
      }
    }
  }

  saveData(); closeSampleModal();
  if(currentPage==='samplelist') renderSampleListPage();
  if(currentPage==='kanban') renderKanban();
  if(currentPage==='overview') renderOverview();
}
function deleteSample(id){
  if(!confirm('確定刪除？'))return;
  sampleRecords=sampleRecords.filter(x=>x.id!==id);
  saveData(); closeSampleModal();
  if(currentPage==='samplelist') renderSampleListPage();
}
function deleteSampleAndRefresh(id){
  sampleRecords=sampleRecords.filter(x=>x.id!==id);
  saveData(); renderSampleListPage();
}

let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();
function renderCalendarPage(){
  const el = document.getElementById('page-calendar');
  const monthNames=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();

  // collect events from items
  const events = {};
  items.forEach(item=>{
    if(item.launchDate) (events[item.launchDate]=events[item.launchDate]||[]).push({label:'上架：'+item.name,color:'#D1FAE5',tc:'#059669'});
    if(item.deadline) (events[item.deadline]=events[item.deadline]||[]).push({label:'死線：'+item.name,color:'#FEE2E2',tc:'#DC2626'});
    if(item.arrivalDate) (events[item.arrivalDate]=events[item.arrivalDate]||[]).push({label:'到貨：'+item.name,color:'#DBEAFE',tc:'#2563EB'});
  });
  sampleRecords.forEach(s=>{
    if(s.sentDate) (events[s.sentDate]=events[s.sentDate]||[]).push({label:'送樣：'+s.itemName,color:'#FFF7ED',tc:'#EA580C'});
    if(s.returnDate) (events[s.returnDate]=events[s.returnDate]||[]).push({label:'回樣：'+s.itemName,color:'#F3E8FF',tc:'#9333EA'});
  });
  purchaseOrders.forEach(po=>{
    if(po.deliveryDate) (events[po.deliveryDate]=events[po.deliveryDate]||[]).push({label:'交期：'+po.poNumber,color:'#FEF9C3',tc:'#CA8A04'});
  });

  let cells = '';
  const pad = firstDay===0?6:firstDay-1;
  for(let i=0;i<pad;i++) cells+=`<div></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const today=new Date().toISOString().slice(0,10);
    const isToday=dateStr===today;
    const dayEvents=events[dateStr]||[];
    cells+=`<div style="min-height:80px;border:1px solid var(--border);border-radius:8px;padding:6px;background:${isToday?'#EEF2FF':'#fff'}">
      <div style="font-size:12px;font-weight:700;color:${isToday?'var(--accent)':'var(--text)'};margin-bottom:4px">${d}</div>
      ${dayEvents.map(ev=>`<div style="font-size:10px;background:${ev.color};color:${ev.tc};border-radius:3px;padding:1px 5px;margin-bottom:2px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${ev.label}</div>`).join('')}
    </div>`;
  }

  el.innerHTML=`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <button onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendarPage()" style="border:1px solid var(--border);border-radius:8px;padding:6px 12px;background:none;cursor:pointer;font-size:14px">‹</button>
      <h2 style="font-size:16px;font-weight:700;flex:1;text-align:center">${calYear} 年 ${monthNames[calMonth]}</h2>
      <button onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendarPage()" style="border:1px solid var(--border);border-radius:8px;padding:6px 12px;background:none;cursor:pointer;font-size:14px">›</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px">
      ${['一','二','三','四','五','六','日'].map(d=>`<div style="text-align:center;font-size:11px;font-weight:700;color:var(--muted);padding:4px">${d}</div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">${cells}</div>
    <div style="margin-top:16px;display:flex;gap:16px;flex-wrap:wrap;font-size:11px;font-weight:700">
      <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;border-radius:3px;background:#D1FAE5;display:inline-block"></span>上架日</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;border-radius:3px;background:#FEE2E2;display:inline-block"></span>下大貨死線</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;border-radius:3px;background:#DBEAFE;display:inline-block"></span>到貨日</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;border-radius:3px;background:#FFF7ED;display:inline-block"></span>送樣</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;border-radius:3px;background:#F3E8FF;display:inline-block"></span>回樣</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;border-radius:3px;background:#FEF9C3;display:inline-block"></span>採購交期</span>
    </div>`;
}

                  <span style="color:${deadlineColor};font-weight:600">${item.deadline?(daysLeft<0?'已逾期 '+Math.abs(daysLeft)+'天':daysLeft===0?'今天截止':'還剩 '+daysLeft+' 天'):'無死線'}</span>
                  <span style="color:var(--muted)">${sampleCount?'🧵'+sampleCount:''}${workOrderCount?' 📋'+workOrderCount:''}</span>
                </div>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
  });
  el.innerHTML=`<div style="display:flex;gap:14px;overflow-x:auto;padding-bottom:12px;min-height:400px">${cols.join('')}</div>`;
}

// ═══ 工單 ═══
let workOrders = [];
let workOrderId = 1;
let woLineId = 1;

function openWorkOrderModal(itemId){
  const item = items.find(i=>i.id===itemId);
  if(!item) return;
  const existing = workOrders.filter(w=>w.itemId===itemId);
  const html=`<div style="position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:500;display:flex;align-items:center;justify-content:center" id="wo-overlay" onclick="if(event.target===this)closeWOModal()">
  <div style="background:#fff;border-radius:16px;width:640px;max-width:96vw;max-height:92vh;overflow-y:auto;padding:24px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:10px">
        <button onclick="closeWOModal();openModal(${itemId})" style="border:1.5px solid var(--border);background:none;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);font-family:var(--font)">← 返回商品</button>
        <h3 style="font-size:15px;font-weight:700">📋 工單 — ${item.name}</h3>
      </div>
      <button onclick="closeWOModal()" style="border:none;background:none;font-size:20px;cursor:pointer;color:var(--muted)">✕</button>
    </div>
    <button onclick="openNewWO(${itemId})" class="add-btn" style="margin-bottom:16px">＋ 新增工單</button>
    ${existing.length===0?'<div style="color:var(--muted);text-align:center;padding:30px;font-size:13px">尚無工單</div>':
    existing.map(wo=>`
      <div style="border:1.5px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div style="font-weight:700;font-size:13px;display:flex;align-items:center;gap:8px">${wo.title} <span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;${(wo.woType||'大貨')==='打樣'?'background:#FFF7ED;color:#EA580C':'background:#EEF2FF;color:#4F46E5'}">${wo.woType||'大貨'}</span> <span style="font-size:11px;color:var(--muted);font-weight:400">· ${wo.factory||'未指定師傅/工廠'}</span></div>
          <div style="display:flex;gap:8px;align-items:center">
            <span style="font-size:11px;color:var(--muted)">${wo.dueDate?'交期 '+wo.dueDate:''}</span>
            <button onclick="openEditWO(${wo.id})" style="border:1px solid var(--border);background:none;border-radius:6px;padding:3px 10px;cursor:pointer;font-size:11px;font-weight:600">編輯</button>
          </div>
        </div>
        <table style="width:100%;border-collapse:collapse;font-size:12px">
          <thead><tr style="color:var(--muted);font-weight:700">
            <th style="text-align:left;padding:4px 6px;border-bottom:1px solid var(--border)">項目</th>
            <th style="text-align:left;padding:4px 6px;border-bottom:1px solid var(--border)">規格</th>
            <th style="text-align:right;padding:4px 6px;border-bottom:1px solid var(--border)">數量</th>
            <th style="text-align:left;padding:4px 6px;border-bottom:1px solid var(--border)">單位</th>
            <th style="text-align:left;padding:4px 6px;border-bottom:1px solid var(--border)">備註</th>
          </tr></thead>
          <tbody>${(wo.lines||[]).map(l=>`<tr>
            <td style="padding:5px 6px;border-bottom:1px solid #f0f0f0;font-weight:600">${l.name}</td>
            <td style="padding:5px 6px;border-bottom:1px solid #f0f0f0;color:var(--muted)">${l.spec||'—'}</td>
            <td style="padding:5px 6px;border-bottom:1px solid #f0f0f0;text-align:right">${l.qty||'—'}</td>
            <td style="padding:5px 6px;border-bottom:1px solid #f0f0f0;color:var(--muted)">${l.unit||''}</td>
            <td style="padding:5px 6px;border-bottom:1px solid #f0f0f0;color:var(--muted)">${l.note||''}</td>
          </tr>`).join('')}</tbody>
        </table>
        ${wo.notes?`<div style="margin-top:8px;font-size:12px;color:var(--muted)">備註：${wo.notes}</div>`:''}
      </div>`).join('')}
  </div></div>`;
  document.body.insertAdjacentHTML('beforeend',html);

function closeWOModal(){ document.getElementById('wo-overlay')?.remove(); }

let editingWOId = null;
let woLines = [];

function openNewWO(itemId){
  editingWOId = null;
  woLines = [];
  showWOEditor(itemId);
}
function openEditWO(woId){
  const wo = workOrders.find(w=>w.id===woId);
  if(!wo) return;
  editingWOId = woId;
  woLines = (wo.lines||[]).map(l=>({...l}));
  showWOEditor(wo.itemId);
}
function showWOEditor(itemId){
  document.getElementById('wo-overlay')?.remove();
  const item = items.find(i=>i.id===itemId);
  const wo = editingWOId?workOrders.find(w=>w.id===editingWOId):{};
  const html=`<div style="position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:500;display:flex;align-items:center;justify-content:center" id="wo-overlay">
  <div style="background:#fff;border-radius:16px;width:680px;max-width:96vw;max-height:92vh;overflow-y:auto;padding:24px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h3 style="font-size:15px;font-weight:700">${editingWOId?'編輯工單':'新增工單'} — ${item.name}</h3>
      <button onclick="closeWOModal()" style="border:none;background:none;font-size:20px;cursor:pointer;color:var(--muted)">✕</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
      <div class="field-group"><div class="fl">工單名稱</div><input class="fi" id="wo-title" value="${wo.title||''}" placeholder="主面料、配件、縫製…"></div>
      <div class="field-group"><div class="fl">類型</div>
        <select class="fi fi-sel" id="wo-type">
          <option value="大貨" ${(wo.woType||'大貨')==='大貨'?'selected':''}>🏭 大貨（計入最終成本）</option>
          <option value="打樣" ${wo.woType==='打樣'?'selected':''}>🧵 打樣（不計入大貨成本）</option>
        </select>
      </div>
      <div class="field-group"><div class="fl">師傅 / 工廠</div><input class="fi" id="wo-factory" value="${wo.factory||''}" placeholder="師傅名稱或工廠"></div>
      <div class="field-group"><div class="fl">預計完成日</div><input class="fi" id="wo-due" type="date" value="${wo.dueDate||''}"></div>
      <div class="field-group"><div class="fl">狀態</div>
        <select class="fi fi-sel" id="wo-status">
          ${['待開始','進行中','已完成'].map(s=>`<option ${wo.status===s?'selected':''}>${s}</option>`).join('')}
        </select>
      </div>
    </div>
    <div style="font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">細項明細</div>
    <table style="width:100%;border-collapse:collapse;margin-bottom:8px" id="wo-lines-table">
      <thead><tr style="font-size:11px;font-weight:700;color:var(--muted);background:#F7F6F3">
        <th style="text-align:left;padding:6px 4px;border-bottom:1px solid var(--border)">從素材庫</th>
        <th style="text-align:left;padding:6px 4px;border-bottom:1px solid var(--border)">項目名稱</th>
        <th style="text-align:left;padding:6px 4px;border-bottom:1px solid var(--border)">規格/顏色</th>
        <th style="text-align:center;padding:6px 4px;border-bottom:1px solid var(--border)">數量</th>
        <th style="text-align:left;padding:6px 4px;border-bottom:1px solid var(--border)">單位</th>
        <th style="text-align:right;padding:6px 4px;border-bottom:1px solid var(--border)">單價</th>
        <th style="text-align:center;padding:6px 4px;border-bottom:1px solid var(--border)">幣別</th>
        <th style="text-align:right;padding:6px 8px;border-bottom:1px solid var(--border)">小計(TWD)</th>
        <th style="padding:6px 4px;border-bottom:1px solid var(--border)"></th>
      </tr></thead>
      <tbody id="wo-lines-body"></tbody>
      <tfoot><tr><td colspan="9" style="padding:8px 8px;text-align:right;font-size:13px;font-weight:800;color:var(--accent)" id="wo-total-row"></td></tr></tfoot>
    </table>
    <button onclick="addWOLine()" style="padding:6px 14px;border:1.5px dashed var(--border);border-radius:8px;background:none;cursor:pointer;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:16px">＋ 新增細項</button>
    <div class="field-group" style="margin-bottom:16px"><div class="fl">工單備註</div><textarea class="fi" id="wo-notes" rows="2" style="resize:vertical">${wo.notes||''}</textarea></div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      ${editingWOId?`<button onclick="deleteWO(${editingWOId},${itemId})" style="padding:8px 14px;border:1.5px solid #DC2626;border-radius:8px;background:none;color:#DC2626;cursor:pointer;font-size:13px;font-weight:600;margin-right:auto">🗑 刪除</button>`:''}
      <button onclick="closeWOModal()" style="padding:8px 16px;border:1.5px solid var(--border);border-radius:8px;background:none;cursor:pointer;font-size:13px;font-weight:600">取消</button>
      <button onclick="saveWO(${itemId})" class="add-btn">儲存工單</button>
    </div>
  </div></div>`;
  document.body.insertAdjacentHTML('beforeend',html);
  renderWOLines();
}
function renderWOLines(){
  const body = document.getElementById('wo-lines-body');
  if(!body) return;
  const rate = getRate();
  body.innerHTML = woLines.map((l,i)=>{
    const qty = parseFloat(l.qty)||0;
    const up = parseFloat(l.unitPrice)||0;
    const sub = up>0&&qty>0?(l.currency==='CNY'?qty*up*rate:qty*up):0;
    return `<tr>
      <td style="padding:3px 4px">
        <button onclick="openMatPicker(${i})" style="padding:4px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:11px;font-weight:600;background:#FAFAFA;cursor:pointer;color:var(--muted);white-space:nowrap;font-family:var(--font)">
          ${l.libId&&materialLib.find(x=>x.id===l.libId)?.image?`<img src="${materialLib.find(x=>x.id===l.libId).image}" style="width:20px;height:20px;object-fit:cover;border-radius:3px;vertical-align:middle;margin-right:4px">`:''} ${l.libId?'已選':'📦 選取'}
        </button>
      </td>
      <td style="padding:3px 4px"><input class="fi" style="padding:5px 8px;font-size:12px" value="${l.name||''}" placeholder="項目名稱" oninput="woLines[${i}].name=this.value;updateWOTotal()"></td>
      <td style="padding:3px 4px"><input class="fi" style="padding:5px 8px;font-size:12px" value="${l.spec||''}" placeholder="規格/顏色" oninput="woLines[${i}].spec=this.value"></td>
      <td style="padding:3px 4px"><input class="fi" style="padding:5px 8px;font-size:12px;width:70px;text-align:center" type="number" value="${l.qty||''}" placeholder="0" oninput="woLines[${i}].qty=this.value;updateWOTotal()"></td>
      <td style="padding:3px 4px"><input class="fi" style="padding:5px 8px;font-size:12px;width:55px" value="${l.unit||''}" placeholder="個/m" oninput="woLines[${i}].unit=this.value"></td>
      <td style="padding:3px 4px"><input class="fi" style="padding:5px 8px;font-size:12px;width:75px;text-align:right" type="number" value="${l.unitPrice||''}" placeholder="單價" oninput="woLines[${i}].unitPrice=this.value;updateWOTotal()"></td>
      <td style="padding:3px 4px">
        <select style="padding:5px 4px;border:1.5px solid var(--border);border-radius:6px;font-size:11px;font-family:var(--font);outline:none;background:#FAFAFA" onchange="woLines[${i}].currency=this.value;updateWOTotal()">
          <option value="CNY" ${(l.currency||'CNY')==='CNY'?'selected':''}>¥</option>
          <option value="TWD" ${l.currency==='TWD'?'selected':''}>NT$</option>
        </select>
      </td>
      <td style="padding:3px 8px;text-align:right;font-size:12px;font-weight:700;color:var(--green);white-space:nowrap">${sub>0?'NT$'+Math.round(sub).toLocaleString():'—'}</td>
      <td style="padding:3px 4px"><button onclick="removeWOLine(${i})" style="border:none;background:none;cursor:pointer;color:#DC2626;font-size:14px">✕</button></td>
    </tr>`;
  }).join('');
  updateWOTotal();
}
function woPickLib(i, libIdStr){
  const libId = parseInt(libIdStr);
  if(!libId){ woLines[i].libId=null; renderWOLines(); return; }
  const m = materialLib.find(x=>x.id===libId);
  if(!m) return;
  woLines[i].libId = libId;
  woLines[i].name = m.name;
  woLines[i].unit = m.unit||'個';
  woLines[i].unitPrice = matUnitPrice(m);
  woLines[i].currency = m.currency;
  renderWOLines();
}

function openMatPicker(lineIndex){
  if(!materialLib.length){ alert('請先到「素材庫」新增素材'); return; }
  const html=`<div style="position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:600;display:flex;align-items:center;justify-content:center" id="mat-picker-overlay" onclick="if(event.target===this)document.getElementById('mat-picker-overlay').remove()">
  <div style="background:#fff;border-radius:16px;width:640px;max-width:95vw;max-height:85vh;overflow-y:auto;padding:24px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h3 style="font-size:15px;font-weight:700">選擇素材</h3>
      <button onclick="document.getElementById('mat-picker-overlay').remove()" style="border:none;background:none;font-size:20px;cursor:pointer;color:var(--muted)">✕</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px">
      ${materialLib.map(m=>{
        const up=matUnitPrice(m); const sym=m.currency==='CNY'?'¥':'NT$';
        const remaining=matRemaining(m);
        const isLow=m.totalStock>0&&remaining<=(m.minStock||0);
        return`<div onclick="pickMatForLine(${lineIndex},${m.id})" style="border:2px solid ${isLow?'#FCA5A5':'var(--border)'};border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color .15s" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='${isLow?'#FCA5A5':'var(--border)'}'">
          <div style="height:90px;background:#F0EFFC;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative">
            ${m.image?`<img src="${m.image}" style="width:100%;height:100%;object-fit:cover">`:`<span style="font-size:28px;color:#ddd">🧵</span>`}
            ${isLow?`<div style="position:absolute;top:4px;right:4px;background:#DC2626;color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px">庫存低</div>`:''}
          </div>
          <div style="padding:8px">
            <div style="font-size:12px;font-weight:700;margin-bottom:2px">${m.name}</div>
            <div style="font-size:11px;color:var(--green);font-weight:600">${sym}${up%1===0?up:up.toFixed(2)}/${m.unit||'個'}</div>
            ${m.totalStock>0?`<div style="font-size:10px;color:${isLow?'#DC2626':'var(--muted)'};margin-top:2px">剩 ${remaining} ${m.unit||'個'}</div>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div></div>`;
  document.body.insertAdjacentHTML('beforeend',html);
}

function pickMatForLine(i, matId){
  document.getElementById('mat-picker-overlay')?.remove();
  const m=materialLib.find(x=>x.id===matId); if(!m)return;
  woLines[i].libId=matId;
  woLines[i].name=m.name;
  woLines[i].unit=m.unit||'個';
  woLines[i].unitPrice=matUnitPrice(m);
  woLines[i].currency=m.currency;
  renderWOLines();
}
function updateWOTotal(){
  const rate = getRate();
  let total = 0;
  woLines.forEach((l,i)=>{
    const qty = parseFloat(document.querySelectorAll('#wo-lines-body tr')[i]?.querySelectorAll('input[type=number]')[0]?.value||l.qty)||0;
    const up = parseFloat(document.querySelectorAll('#wo-lines-body tr')[i]?.querySelectorAll('input[type=number]')[1]?.value||l.unitPrice)||0;
    const cur = l.currency||'CNY';
    total += up>0&&qty>0?(cur==='CNY'?qty*up*rate:qty*up):0;
  });
  const el = document.getElementById('wo-total-row');
  if(el) el.textContent = total>0?'合計：NT$ '+Math.round(total).toLocaleString():'';
}
function addWOLine(){ woLines.push({id:woLineId++,name:'',spec:'',qty:'',unit:'',unitPrice:'',currency:'CNY',note:'',libId:null}); renderWOLines(); }
function removeWOLine(i){ woLines.splice(i,1); renderWOLines(); }
function saveWO(itemId){
  const wo={
    id:editingWOId||workOrderId++,
    itemId,
    title:document.getElementById('wo-title').value||'工單',
    woType:document.getElementById('wo-type').value,
    factory:document.getElementById('wo-factory').value,
    dueDate:document.getElementById('wo-due').value,
    status:document.getElementById('wo-status').value,
    notes:document.getElementById('wo-notes').value,
    lines:[...woLines],
  };
  if(editingWOId) workOrders[workOrders.findIndex(w=>w.id===editingWOId)]=wo;
  else workOrders.push(wo);
  saveData();
  closeWOModal();
  openWorkOrderModal(itemId);
}
function deleteWO(woId,itemId){
  if(!confirm('確定刪除此工單？'))return;
  workOrders=workOrders.filter(w=>w.id!==woId);
  saveData();
  closeWOModal();
  openWorkOrderModal(itemId);
}

function updateLowStockBar(){
  const lowStock=materialLib.filter(m=>m.totalStock>0&&matRemaining(m)<=(m.minStock||0));
  const bar=document.getElementById('low-stock-bar');
  const names=document.getElementById('low-stock-names');
  if(!bar||!names)return;
  if(lowStock.length){
    names.textContent=lowStock.map(m=>m.name).join('、');
    bar.style.display='flex';
  } else {
    bar.style.display='none';
  }
}
