<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dilute Studio</title>
<style>
:root{
  --bg:#F7F6F3;--white:#FFFFFF;--sidebar:#1C1C1E;--accent:#6C63FF;
  --accent2:#FF6584;--green:#16A34A;--text:#1C1C1E;--muted:#8E8E93;
  --border:#E5E5EA;--shadow:0 2px 12px rgba(0,0,0,0.07);--r:12px;--tr:6px;
  --font:'Segoe UI','PingFang TC','Microsoft JhengHei',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;}
#sidebar{width:210px;min-width:210px;background:var(--sidebar);display:flex;flex-direction:column;padding:20px 14px;gap:4px;color:#fff;overflow-y:auto;flex-shrink:0;}
.logo{font-size:17px;font-weight:700;padding:0 8px 18px;border-bottom:1px solid #333;margin-bottom:8px;}
.logo span{color:var(--accent);}
.sb-section{font-size:10px;font-weight:700;color:#555;letter-spacing:1.5px;text-transform:uppercase;padding:10px 8px 4px;}
.sb-btn{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:#aaa;border:none;background:none;width:100%;text-align:left;transition:all .15s;}
.sb-btn:hover{background:#2C2C2E;color:#fff;}
.sb-btn.active{background:var(--accent);color:#fff;font-weight:600;}
.rate-box{margin-top:auto;background:#2C2C2E;border-radius:10px;padding:12px;}
.rate-box label{font-size:10px;color:#777;display:block;margin-bottom:4px;}
.rate-box input{background:#3A3A3C;border:none;color:#fff;font-size:14px;font-weight:600;width:100%;padding:6px 8px;border-radius:6px;outline:none;}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#topbar{background:var(--white);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap;}
.page-tabs{display:flex;gap:2px;background:var(--bg);border-radius:8px;padding:3px;}
.ptab{padding:6px 12px;border-radius:6px;border:none;background:none;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);transition:all .15s;}
.ptab.active{background:var(--white);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.1);}
.search-box{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:6px 12px;flex:1;max-width:260px;}
.search-box input{border:none;background:none;outline:none;font-size:13px;width:100%;}
.view-toggle{display:flex;gap:4px;background:var(--bg);border-radius:8px;padding:3px;}
.vbtn{padding:5px 10px;border-radius:6px;border:none;background:none;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);}
.vbtn.active{background:var(--white);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.1);}
.add-btn{padding:7px 14px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}
.ml-auto{margin-left:auto;}
.chip{padding:4px 11px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--border);background:none;cursor:pointer;color:var(--muted);}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}
#season-chips-row{display:flex;gap:6px;flex-wrap:wrap;padding:8px 18px;border-bottom:1px solid var(--border);background:var(--white);}
#content{flex:1;overflow-y:auto;padding:20px;}

/* CARDS */
#card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;}
.item-card{background:var(--white);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;cursor:pointer;transition:transform .15s;}
.item-card:hover{transform:translateY(-2px);}
.card-thumb{height:140px;background:#F0EFFC;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.card-thumb img{width:100%;height:100%;object-fit:cover;}
.stage-badge{position:absolute;top:8px;right:8px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:var(--tr);}
.card-body{padding:11px;}
.card-code{font-size:10px;color:var(--muted);font-weight:600;margin-bottom:2px;}
.card-name{font-size:13px;font-weight:600;margin-bottom:6px;}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;}
.tag{font-size:10px;padding:2px 7px;border-radius:var(--tr);font-weight:600;}
.card-price{display:flex;justify-content:space-between;align-items:center;}
.price-twd{font-size:13px;font-weight:700;}

/* TIMELINE */
.tl-month{margin-bottom:24px;}
.tl-month-label{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.tl-month-label::after{content:'';flex:1;height:1px;background:var(--border);}
.tl-cards{display:flex;gap:10px;flex-wrap:wrap;}
.tl-card{background:var(--white);border-radius:10px;padding:13px;width:180px;cursor:pointer;box-shadow:var(--shadow);border-left:3px solid var(--accent);}
.tl-date{font-size:11px;color:var(--muted);margin-bottom:2px;}
.tl-name{font-size:13px;font-weight:600;}

/* TABLE */
.data-table{width:100%;border-collapse:collapse;background:var(--white);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);}
.data-table th{background:#F7F6F3;font-size:11px;font-weight:700;color:var(--muted);padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);}
.data-table td{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--border);}
.data-table tr:last-child td{border-bottom:none;}
.data-table tr:hover td{background:#F9F9FB;}

/* MODAL */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center;}
#modal-overlay.open{display:flex;}
#modal{background:var(--white);border-radius:16px;width:680px;max-width:96vw;max-height:92vh;overflow-y:auto;}
.modal-hd{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;position:sticky;top:0;background:var(--white);z-index:2;}
.modal-hd h2{font-size:16px;font-weight:700;flex:1;}
.modal-close{border:none;background:none;font-size:20px;cursor:pointer;color:var(--muted);}
.modal-body{padding:20px 22px;display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.modal-section-hd{grid-column:1/-1;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;padding-top:6px;border-top:1px solid var(--border);}
.modal-section-hd:first-child{border-top:none;padding-top:0;}
.field-group{display:flex;flex-direction:column;gap:4px;}
.field-group.full{grid-column:1/-1;}
.fl{font-size:11px;font-weight:700;color:var(--muted);}
.fi{padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font);outline:none;}
.fi:focus{border-color:var(--accent);}
.fi-sel{background:#FAFAFA;}
.modal-ft{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:center;position:sticky;bottom:0;background:var(--white);}
.btn-del{padding:8px 14px;border:1.5px solid #DC2626;border-radius:8px;background:none;color:#DC2626;cursor:pointer;font-size:13px;font-weight:600;}
.btn-cancel{padding:8px 14px;border:1.5px solid var(--border);border-radius:8px;background:none;cursor:pointer;font-size:13px;font-weight:600;margin-left:auto;}
.btn-save{padding:8px 20px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;}
.btn-sl{padding:8px 14px;border:1.5px solid var(--green);border-radius:8px;background:none;color:var(--green);cursor:pointer;font-size:13px;font-weight:600;}

/* IMG UPLOAD */
.img-upload-area{grid-column:1/-1;border:2px dashed var(--border);border-radius:10px;padding:14px;text-align:center;cursor:pointer;background:#FAFAFA;}
.img-upload-area:hover{border-color:var(--accent);}
.img-preview-strip{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.img-thumb-wrap{position:relative;display:inline-block;}
.img-thumb{width:68px;height:68px;border-radius:8px;object-fit:cover;border:1.5px solid var(--border);}
.img-thumb-del{position:absolute;top:-5px;right:-5px;width:17px;height:17px;border-radius:50%;background:#DC2626;color:#fff;border:none;cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;}

/* POPUP generic */
.popup-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.38);z-index:200;align-items:center;justify-content:center;}
.popup-overlay.open{display:flex;}
.popup-box{background:var(--white);border-radius:14px;padding:22px 24px;width:370px;max-height:85vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,0.18);}
.popup-title{font-size:15px;font-weight:700;margin-bottom:14px;}
.popup-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;max-height:220px;overflow-y:auto;}
.popup-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border-radius:8px;}
.popup-item-name{flex:1;font-size:13px;font-weight:600;}
.popup-item-code{font-size:11px;color:var(--muted);background:var(--border);padding:2px 6px;border-radius:4px;}
.popup-del{border:none;background:none;cursor:pointer;color:#DC2626;font-size:14px;}
.popup-divider{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin:10px 0 8px;padding-top:10px;border-top:1px solid var(--border);}
.popup-row{display:flex;flex-direction:column;gap:3px;margin-bottom:8px;}
.popup-label{font-size:11px;font-weight:700;color:var(--muted);}
.popup-inp{padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font);outline:none;width:100%;}
.popup-inp:focus{border-color:var(--accent);}
.popup-btns{display:flex;gap:8px;margin-top:10px;}
.popup-btn-cancel{flex:1;padding:8px;border:1.5px solid var(--border);border-radius:8px;background:none;cursor:pointer;font-size:13px;font-weight:600;font-family:var(--font);}
.popup-btn-save{flex:2;padding:8px;border:none;border-radius:8px;background:var(--accent);color:#fff;cursor:pointer;font-size:13px;font-weight:700;font-family:var(--font);}

/* SKU PAGE */
.sku-container{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:800px;margin:0 auto;}
.sku-result-box{background:var(--white);border-radius:var(--r);box-shadow:var(--shadow);padding:22px;display:flex;flex-direction:column;gap:12px;}
.sku-preview{font-size:26px;font-weight:800;letter-spacing:2px;color:var(--text);word-break:break-all;}
.sku-breakdown{display:flex;gap:6px;flex-wrap:wrap;}
.sku-part{display:inline-flex;flex-direction:column;align-items:center;padding:6px 10px;border-radius:8px;font-weight:700;font-size:13px;line-height:1.3;text-align:center;}
.sku-copy-btn{padding:10px;border:1.5px solid var(--accent);border-radius:8px;color:var(--accent);background:none;cursor:pointer;font-size:13px;font-weight:700;font-family:var(--font);}
.sku-apply-btn{padding:10px;background:var(--accent);border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:13px;font-weight:700;font-family:var(--font);}
.sku-form{background:var(--white);border-radius:var(--r);box-shadow:var(--shadow);padding:20px;display:flex;flex-direction:column;gap:14px;}
.sku-field label{font-size:11px;font-weight:700;color:var(--muted);display:block;margin-bottom:5px;}
.sku-select{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font);outline:none;background:#FAFAFA;}
.sku-select-row{display:flex;gap:6px;}
.sku-add-btn{padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;background:none;cursor:pointer;font-size:12px;font-weight:700;color:var(--muted);white-space:nowrap;}
.sku-add-btn:hover{border-color:var(--accent);color:var(--accent);}
.sku-sub{font-size:11px;color:var(--muted);margin-top:3px;}

/* COST PAGE */
.preset-tag{padding:5px 11px;border-radius:20px;border:1.5px solid var(--border);background:none;cursor:pointer;font-size:11px;font-weight:600;color:var(--muted);font-family:var(--font);white-space:nowrap;}
.preset-tag:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.cost-row-inp{border:none;outline:none;font-size:13px;font-family:var(--font);width:100%;background:transparent;}
.cost-cur-sel{border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:var(--font);padding:3px 4px;background:#FAFAFA;outline:none;}
.cost-del-btn{border:none;background:none;cursor:pointer;color:#DC2626;font-size:14px;}

/* QA POPUP */
#qa-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:300;align-items:center;justify-content:center;}
#qa-overlay.open{display:flex;}
#qa-box{background:var(--white);border-radius:14px;padding:22px 24px;width:360px;box-shadow:0 16px 48px rgba(0,0,0,0.18);}
.qa-title{font-size:15px;font-weight:700;margin-bottom:14px;}
.qa-row{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.qa-label{font-size:11px;font-weight:700;color:var(--muted);}
.qa-inp{padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font);outline:none;width:100%;}
.qa-inp:focus{border-color:var(--accent);}
.qa-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.qa-btns{display:flex;gap:8px;margin-top:14px;}
.qa-btn-cancel{flex:1;padding:9px;border:1.5px solid var(--border);border-radius:8px;background:none;cursor:pointer;font-size:13px;font-weight:600;font-family:var(--font);color:var(--muted);}
.qa-btn-add{flex:2;padding:9px;border:none;border-radius:8px;background:var(--accent);color:#fff;cursor:pointer;font-size:13px;font-weight:700;font-family:var(--font);}

/* INVENTORY */
.inv-stat-card{background:var(--white);border-radius:var(--r);box-shadow:var(--shadow);padding:16px 20px;}
.inv-stat-val{font-size:26px;font-weight:800;}
.inv-stat-lbl{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.inv-conn-row{display:flex;gap:10px;align-items:center;}
.inv-inp{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font);outline:none;flex:1;}
.inv-btn{padding:8px 16px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);}

/* SHOPLINE */
.sl-container{max-width:800px;margin:0 auto;}
.sl-section{background:var(--white);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden;}
.sl-section-hd{padding:13px 18px;font-size:13px;font-weight:700;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none;}
.sl-section-body{padding:16px 18px;display:grid;grid-template-columns:1fr 1fr;gap:12px;border-top:1px solid var(--border);}
.sl-field{display:flex;flex-direction:column;gap:4px;}
.sl-field.full{grid-column:1/-1;}
.sl-label{font-size:11px;font-weight:700;color:var(--muted);}
.sl-input{padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font);outline:none;width:100%;}
.sl-textarea{min-height:70px;resize:vertical;}
.sl-select{background:#FAFAFA;}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="logo">Dilute <span>Studio</span></div>
  <div class="sb-section">分類篩選</div>
  <button class="sb-btn active" onclick="setSideFilter('all','',this)">📋 全部商品</button>
  <button class="sb-btn" onclick="setSideFilter('stage','設計中',this)">🎨 設計中</button>
  <button class="sb-btn" onclick="setSideFilter('stage','打樣中',this)">🔨 打樣中</button>
  <button class="sb-btn" onclick="setSideFilter('stage','樣品確認',this)">✅ 樣品確認</button>
  <button class="sb-btn" onclick="setSideFilter('stage','大貨生產',this)">🏭 大貨生產</button>
  <button class="sb-btn" onclick="setSideFilter('stage','完成',this)">📦 完成</button>
  <button class="sb-btn" onclick="setSideFilter('stage','已上架',this)">🛍 已上架</button>
  <div class="sb-section">資料</div>
  <button class="sb-btn" onclick="exportData()">⬇ 資料檔案儲存</button>
  <label class="sb-btn" style="cursor:pointer">⬆ 資料檔案還原<input type="file" accept=".json" onchange="importData(event)" style="display:none"></label>
  <div class="rate-box">
    <label>匯率 CNY → TWD</label>
    <input type="number" id="rate-input" value="4.62" step="0.01" oninput="renderOverview()">
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <!-- TOPBAR -->
  <div id="topbar">
    <div class="page-tabs">
      <button class="ptab active" onclick="showPage('overview',this)">📋 商品總覽</button>
      <button class="ptab" onclick="showPage('cost',this)">🧮 成本計算</button>
      <button class="ptab" onclick="showPage('sku',this)">🏷 貨號產生器</button>
      <button class="ptab" onclick="showPage('shopline',this)">🛍 ShopLine上架</button>
      <button class="ptab" onclick="showPage('inventory',this)">📦 庫存盤點</button>
    </div>
    <div id="search-wrap" class="search-box"><span>🔍</span><input type="text" placeholder="搜尋商品…" oninput="renderOverview()" id="search-inp"></div>
    <div id="view-toggle" class="view-toggle">
      <button class="vbtn active" onclick="setView('grid',this)">⊞</button>
      <button class="vbtn" onclick="setView('timeline',this)">📅</button>
      <button class="vbtn" onclick="setView('table',this)">☰</button>
    </div>
    <span id="count-lbl" class="ml-auto" style="font-size:12px;color:var(--muted);white-space:nowrap;"></span>
    <button class="add-btn" id="add-item-btn" onclick="openModal()">＋ 新增商品</button>
  </div>

  <!-- SEASON CHIPS -->
  <div id="season-chips-row">
    <!-- rendered by renderSeasonChips() -->
  </div>
  <!-- CATEGORY CHIPS -->
  <div id="cat-chips-row" style="display:flex;gap:6px;flex-wrap:wrap;padding:6px 18px;border-bottom:1px solid var(--border);background:#FAFAFA;">
    <!-- rendered by renderCatChips() -->
  </div>

  <!-- CONTENT -->
  <div id="content">
    <div id="page-overview"></div>
    <div id="page-cost" style="display:none"></div>
    <div id="page-sku" style="display:none"></div>
    <div id="page-shopline" style="display:none"></div>
    <div id="page-inventory" style="display:none"></div>
  </div>
</div>

<!-- ═══ POPUPS ═══ -->

<!-- ITEM MODAL -->
<div id="modal-overlay" onclick="closeModalOutside(event)">
  <div id="modal">
    <div class="modal-hd">
      <h2 id="modal-title">新增商品</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-ft">
      <button class="btn-del" id="modal-del" style="display:none" onclick="deleteItem()">🗑 刪除</button>
      <button class="btn-sl" id="modal-sl" style="display:none" onclick="sendToShopline()">🛍 送上架頁</button>
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveItem()">儲存</button>
    </div>
  </div>
</div>

<!-- ENTITY MANAGE POPUP (color/supplier/designer/season/year/cat) -->
<div class="popup-overlay" id="entity-popup">
  <div class="popup-box">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <div class="popup-title" id="ep-title" style="margin:0">管理</div>
      <button onclick="closeEntityPopup()" style="border:none;background:none;font-size:20px;cursor:pointer;color:var(--muted)">✕</button>
    </div>
    <div class="popup-list" id="ep-list"></div>
    <div class="popup-divider">新增項目</div>
    <div class="popup-row"><div class="popup-label" id="ep-name-label">名稱</div><input class="popup-inp" id="ep-name" placeholder="名稱"></div>
    <div class="popup-row" id="ep-code-row"><div class="popup-label" id="ep-code-label">代號</div><input class="popup-inp" id="ep-code" placeholder="代號" maxlength="6"></div>
    <div class="popup-btns">
      <button class="popup-btn-cancel" onclick="closeEntityPopup()">關閉</button>
      <button class="popup-btn-save" onclick="saveEntity()">＋ 新增</button>
    </div>
  </div>
</div>

<!-- SEASON MANAGE POPUP (for SEASONS array - overview filter) -->
<div class="popup-overlay" id="season-mgr-popup">
  <div class="popup-box">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <div class="popup-title" style="margin:0">管理季度</div>
      <button onclick="closeSeasonMgr()" style="border:none;background:none;font-size:20px;cursor:pointer;color:var(--muted)">✕</button>
    </div>
    <div class="popup-list" id="sm-list"></div>

// ═══ PAGE SWITCHING ═══
function showPage(page, btn){
  currentPage = page;
  document.querySelectorAll('.ptab').forEach(b=>b.classList.remove('active'));

  ['overview','cost','sku','shopline','inventory'].forEach(p=>{
    document.getElementById('page-'+p).style.display = p===page?'block':'none';
  });

// ═══ SEASON CHIPS ═══
function renderSeasonChips(){
  const row = document.getElementById('season-chips-row');
  const chips = [
    `<button class="chip ${activeSeason===''?'active':''}" onclick="setSeasonFilter('')">全部</button>`,
    ...SEASONS.map(s=>`<button class="chip ${activeSeason===s?'active':''}" onclick="setSeasonFilter('${s}')">${s}</button>`),
    `<button onclick="openSeasonMgr()" style="padding:4px 10px;border-radius:20px;border:1.5px dashed var(--border);background:none;cursor:pointer;font-size:11px;font-weight:700;color:var(--muted);">⚙ 管理季度</button>`
  ];
  row.innerHTML = chips.join('');
}
function setSeasonFilter(s){ activeSeason=s; renderSeasonChips(); renderOverview(); }

// ═══ CATEGORY CHIPS ═══
function renderCatChips(){
  const row = document.getElementById('cat-chips-row');
  if(!row) return;
  const chips = [
    `<button class="chip ${activeCat===''?'active':''}" onclick="setCatFilter('')" style="font-size:11px;padding:3px 10px">全部類別</button>`,
    ...CATS.map(c=>`<button class="chip ${activeCat===c.name?'active':''}" onclick="setCatFilter('${c.name}')" style="font-size:11px;padding:3px 10px">${c.name}</button>`)
  ];
  row.innerHTML = chips.join('');
}
function setCatFilter(c){ activeCat=c; renderCatChips(); renderOverview(); }

function openSeasonMgr(){
  renderSmList();
  document.getElementById('season-mgr-popup').classList.add('open');
}

function renderSmList(){
  document.getElementById('sm-list').innerHTML = SEASONS.map((s,i)=>`
    <div class="popup-item">
      <span class="popup-item-name">${s}</span>
      <button class="popup-del" onclick="deleteSeason(${i})">✕</button>
    </div>`).join('');
}
function addSeason(){
  const inp = document.getElementById('sm-new');
  const v = inp.value.trim();
  if(!v) return;
  if(SEASONS.includes(v)){alert('此季度已存在');return;}
  SEASONS.push(v);
  inp.value='';
  renderSmList();
  renderSeasonChips();
  refreshModalSeasonSel();
  saveData(); pushConfigToBackend();
}
function deleteSeason(i){
  if(SEASONS.length<=1){alert('至少保留一個季度');return;}
  SEASONS.splice(i,1);
  if(!SEASONS.includes(activeSeason)) activeSeason='';
  renderSmList();
  renderSeasonChips();
  refreshModalSeasonSel();
  saveData(); pushConfigToBackend();
}
function refreshModalSeasonSel(){
  const sel = document.getElementById('f-season');
  if(!sel) return;
  const cur = sel.value;
  sel.innerHTML = SEASONS.map(s=>`<option ${s===cur?'selected':''}>${s}</option>`).join('');
}

// ═══ SIDE FILTER ═══
function setSideFilter(type,value,btn){
  sideFilter={type,value};
  document.querySelectorAll('.sb-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderOverview();
}

// ═══ VIEW ═══
function setView(v,btn){
  currentView=v;
  document.querySelectorAll('.vbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderOverview();
}

// ═══ OVERVIEW ═══
function getFilteredItems(){
  const q = (document.getElementById('search-inp')?.value||'').toLowerCase();
  return items.filter(item=>{
    if(sideFilter.type==='stage' && item.stage!==sideFilter.value) return false;
    if(activeSeason && item.season!==activeSeason) return false;
    if(activeCat && item.category!==activeCat) return false;
    if(q && !item.name.toLowerCase().includes(q) && !(item.code||'').toLowerCase().includes(q)) return false;
    return true;
  });
}

function renderOverview(){
  const el = document.getElementById('page-overview');
  const list = getFilteredItems();
  document.getElementById('count-lbl').textContent = list.length+' 件';
  if(currentView==='grid') el.innerHTML = renderGrid(list);
  else if(currentView==='timeline') el.innerHTML = renderTimeline(list);
  else el.innerHTML = renderTable(list);
}

function renderGrid(list){
  if(!list.length) return '<div style="color:var(--muted);padding:40px;text-align:center">沒有符合的商品</div>';
  return `<div id="card-grid">${list.map(item=>{
    const img = item.images&&item.images[0]?`<img src="${item.images[0]}">`:'<span style="font-size:36px;color:#ddd">👗</span>';
    const bg=stageColor[item.stage]||'#EEF2FF', tc=stageText[item.stage]||'#4F46E5';
    const rate=getRate();
    return `<div class="item-card" onclick="openModal(${item.id})">
      <div class="card-thumb">${img}<span class="stage-badge" style="background:${bg};color:${tc}">${item.stage}</span></div>
      <div class="card-body">
        <div class="card-code">${item.code||''}</div>
        <div class="card-name">${item.name}</div>
        <div class="card-tags">
          <span class="tag" style="background:#EEF2FF;color:#4F46E5">${item.season||''}</span>
          <span class="tag" style="background:#F0FDF4;color:#16A34A">${item.category||''}</span>
        </div>
        <div class="card-price">
          <span class="price-twd">${item.priceTwd?'NT$ '+Number(item.priceTwd).toLocaleString():''}</span>
          <span style="font-size:10px;color:var(--muted)">${item.costCny?'¥'+item.costCny:''}</span>
        </div>
        ${item.launchTbd?'<div style="font-size:10px;color:var(--muted);margin-top:3px">上架：待定</div>':item.launchDate?`<div style="font-size:10px;color:var(--muted);margin-top:3px">上架：${item.launchDate}</div>`:''}
      </div>
    </div>`;
  }).join('')}</div>`;
}

function renderTimeline(list){
  const byMonth={};
  list.forEach(item=>{
    const key = item.launchTbd?'待定':item.launchDate?item.launchDate.slice(0,7):'未設定';
    (byMonth[key]=byMonth[key]||[]).push(item);
  });
  return Object.entries(byMonth).sort(([a],[b])=>a<b?-1:1).map(([month,its])=>`
    <div class="tl-month">
      <div class="tl-month-label">${month}</div>
      <div class="tl-cards">${its.map(item=>`
        <div class="tl-card" onclick="openModal(${item.id})" style="border-left-color:${stageText[item.stage]||'#6C63FF'}">
          <div class="tl-date">${item.launchTbd?'上架待定':item.launchDate||'—'}</div>
          <div class="tl-name">${item.name}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:4px">${item.code||''}</div>
        </div>`).join('')}
      </div>
    </div>`).join('');
}

function renderTable(list){
  return `<table class="data-table">
    <thead><tr>
      <th>貨號</th><th>款式名稱</th><th>季度</th><th>類別</th>
      <th>大貨階段</th><th>上架日期</th><th>售價 NT$</th><th>成本 ¥</th>
    </tr></thead>
    <tbody>${list.map(item=>`<tr onclick="openModal(${item.id})">
      <td>${item.code||''}</td>
      <td style="font-weight:600">${item.name}</td>
      <td>${item.season||''}</td>
      <td>${item.category||''}</td>
      <td><span style="background:${stageColor[item.stage]||'#eee'};color:${stageText[item.stage]||'#333'};padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700">${item.stage}</span></td>
      <td>${item.launchTbd?'待定':item.launchDate||'—'}</td>
      <td>${item.priceTwd?'NT$ '+Number(item.priceTwd).toLocaleString():''}</td>
      <td>${item.costCny?'¥'+item.costCny:''}</td>
    </tr>`).join('')}
    </tbody></table>`;
}

function toggleLaunchTbd(){
  const chk = document.getElementById('f-launch-tbd');
  const inp = document.getElementById('f-launch');
  inp.disabled = chk.checked;
  if(chk.checked) inp.value='';
}

function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); }
function closeModalOutside(e){ if(e.target===document.getElementById('modal-overlay')) closeModal(); }
function updateCostPrev(){
  const cny=parseFloat(document.getElementById('f-cny')?.value)||0;
  const rate=getRate();
  const unitTwd=Math.round(cny*rate);
  const twdEl=document.getElementById('f-twdcost');
  if(twdEl) twdEl.value=unitTwd?'NT$ '+unitTwd.toLocaleString():'';

  // total units from sizes
  const totalUnits=Object.values(modalSizes).reduce((a,b)=>a+(parseInt(b)||0),0);
  const totalCost=unitTwd*totalUnits;
  const price=parseFloat(document.getElementById('f-price')?.value)||0;
  const profit=price-unitTwd;
  const margin=price>0?Math.round(profit/price*100):0;

  const tcEl=document.getElementById('f-total-cost');
  if(tcEl) tcEl.textContent=totalUnits>0&&unitTwd>0?'NT$ '+totalCost.toLocaleString():'—';
  const prEl=document.getElementById('f-profit');
  if(prEl) prEl.textContent=price&&unitTwd?(profit>=0?'NT$ ':'- NT$ ')+Math.abs(profit).toLocaleString():'—';
  const mgEl=document.getElementById('f-margin');
  if(mgEl) mgEl.textContent=price&&unitTwd?margin+'%':'—';
}

function saveItem(){
  const tbd = document.getElementById('f-launch-tbd')?.checked||false;
  const item={
    id:editingId||nextId++,
    code:document.getElementById('f-code').value,

function initModalSizes(sizes){

function buildSizeInputsHtml(){
  return Object.entries(modalSizes).map(([sz,qty])=>`
    <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
      <div style="font-size:10px;font-weight:700;color:var(--muted)">${sz}</div>
      <input type="number" value="${qty}" min="0" style="width:52px;padding:5px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;text-align:center;outline:none;font-family:var(--font)"
        oninput="modalSizes['${sz}']=parseInt(this.value)||0;calcSizeTotal();updateCostPrev()">
    </div>`).join('');
}
function addSizeField(){
  const inp=document.getElementById('f-new-size');
  const sz=inp.value.trim();
  if(!sz||sz in modalSizes)return;
  modalSizes[sz]=0;
  inp.value='';
  document.getElementById('f-sizes-wrap').innerHTML=buildSizeInputsHtml();
  calcSizeTotal();
}
function calcSizeTotal(){
  const total=Object.values(modalSizes).reduce((a,b)=>a+(parseInt(b)||0),0);
  const el=document.getElementById('f-size-total');
  if(el) el.textContent=total;
}
function collectSizes(){
  const out={};
  Object.keys(modalSizes).forEach(sz=>{
    const v=parseInt(modalSizes[sz])||0;
    if(v>0) out[sz]=v;
  });
  return out;
}

function handleImgUpload(e){
  const files=Array.from(e.target.files);
  const rem=12-modalImages.length;
  files.slice(0,rem).forEach(f=>{
    const reader=new FileReader();
    reader.onload=ev=>{ modalImages.push(ev.target.result); refreshImgPreview(); };
    reader.readAsDataURL(f);
  });
  e.target.value='';
}
function refreshImgPreview(){
  const el=document.getElementById('f-img-preview');
  if(!el)return;
  el.innerHTML=modalImages.map((src,i)=>`

      <img class="img-thumb" src="${src}">

}
function removeImg(i,e){ e.stopPropagation(); modalImages.splice(i,1); refreshImgPreview(); }

function getEntityArr(){
  return {color:skuColors,supplier:skuSuppliers,designer:skuDesigners,year:skuYears,season:skuSeasons,cat:CATS}[entityType]||[];
}
function renderEntityList(){
  const arr=getEntityArr();
  document.getElementById('ep-list').innerHTML=arr.length===0
    ?'<div style="color:var(--muted);font-size:13px;padding:6px 0">尚無項目</div>'
    :arr.map((e,i)=>`
      <div class="popup-item">
        ${typeof e==='string'
          ?`<span class="popup-item-name">${e}</span>`
          :`<span class="popup-item-name">${e.name}</span><span class="popup-item-code">${e.code}</span>`}
        <button class="popup-del" onclick="deleteEntity(${i})">✕</button>
      </div>`).join('');

function deleteEntity(i){
  const arr=getEntityArr();
  if(arr.length<=1){alert('至少保留一個項目');return;}
  arr.splice(i,1);
  renderEntityList();
  refreshEntitySelects();
  saveData(); pushConfigToBackend();
}
function saveEntity(){
  const name=document.getElementById('ep-name').value.trim();
  if(!name){alert('請填寫名稱');return;}
  const rawCode=document.getElementById('ep-code').value.trim();
  const isNum=(entityType==='season'||entityType==='year');
  const code=isNum?rawCode.padStart(2,'0'):rawCode.toUpperCase();
  if(!code){alert('請填寫代號');return;}
  const arr=getEntityArr();
  if(arr.some(e=>e.name===name)){alert('已存在');return;}
  arr.push({name,code});
  document.getElementById('ep-name').value='';
  document.getElementById('ep-code').value='';
  renderEntityList();
  refreshEntitySelects();
  saveData();
}
function refreshEntitySelects(){
  // refresh modal selects if open
  const supSel=document.getElementById('f-supplier');
  if(supSel){
    const cur=supSel.value;
    supSel.innerHTML='<option value="">— 請選擇 —</option>'+skuSuppliers.map(s=>`<option value="${s.name}" ${s.name===cur?'selected':''}>${s.name} (${s.code})</option>`).join('');
  }
  const desSel=document.getElementById('f-designer');
  if(desSel){
    const cur=desSel.value;
    desSel.innerHTML='<option value="">— 請選擇 —</option>'+skuDesigners.map(d=>`<option value="${d.name}" ${d.name===cur?'selected':''}>${d.name} (${d.code})</option>`).join('');
  }
  const catSel=document.getElementById('f-cat');
  if(catSel){ const cur=catSel.value; catSel.innerHTML=CATS.map(c=>`<option value="${c.name}" ${c.name===cur?'selected':''}>${c.name} (${c.code})</option>`).join(''); }
  // refresh category chips
  if(!CATS.some(c=>c.name===activeCat)) activeCat='';
  renderCatChips();
  // refresh sku page if visible
  if(currentPage==='sku') populateSkuSelects();
}

function populateSkuSelects(){
  function fill(id,arr){
    const sel=document.getElementById(id);
    if(!sel)return;
    const cur=sel.value;
    sel.innerHTML=arr.map((e,i)=>`<option value="${i}">${e.code} ${e.name}</option>`).join('');
    if(cur) sel.value=cur;
  }
  fill('sku-year',skuYears);
  fill('sku-cat',CATS);
  fill('sku-color',skuColors);
  // default year to '26'
  const sel=document.getElementById('sku-year');
  if(sel&&sel.value==='0'){
    const di=skuYears.findIndex(y=>y.code==='26');
    if(di>=0) sel.value=di;
  }
}

function buildSku(){
  const yi=parseInt(document.getElementById('sku-year')?.value);
  const cati=parseInt(document.getElementById('sku-cat')?.value);
  const ci=parseInt(document.getElementById('sku-color')?.value);
  const suffix=(document.getElementById('sku-seq')?.value||'').trim();
  if(isNaN(yi)||isNaN(cati)||isNaN(ci)){const p=document.getElementById('sku-preview');if(p)p.textContent='—';return;}
  const year=skuYears[yi];const cat=CATS[cati];const color=skuColors[ci];
  const code=suffix?`${year.code}${cat.code}${color.code}-${suffix}`:`${year.code}${cat.code}${color.code}`;
  const prev=document.getElementById('sku-preview');if(prev)prev.textContent=code;
  const parts=[
    {label:year.code,desc:'年份',bg:'#EEF2FF',tc:'#4F46E5'},
    {label:`${cat.code} ${cat.name}`,desc:'類別',bg:'#FFF7ED',tc:'#EA580C'},
    {label:color.code,desc:'顏色',bg:'#F0FDF4',tc:'#16A34A'},
  ];
  if(suffix) parts.push({label:'-'+suffix,desc:'後綴',bg:'#FFF9C4',tc:'#854D0E'});
  const bd=document.getElementById('sku-breakdown');
  if(bd) bd.innerHTML=parts.map(p=>`<span class="sku-part" style="background:${p.bg};color:${p.tc}">${p.label}<br><small style="font-weight:400;font-size:10px">${p.desc}</small></span>`).join('');
  const cs2=document.getElementById('sku-cat-sub');if(cs2)cs2.textContent=`類別代號：${cat.code}（${cat.name}）`;
  const cs=document.getElementById('sku-color-sub');if(cs)cs.textContent=`顏色代號：${color.code}`;
}

function copySkuCode(){
  const code=document.getElementById('sku-preview')?.textContent;
  if(!code||code==='—')return;
  navigator.clipboard.writeText(code).then(()=>{
    const btn=event.target;btn.textContent='✅ 已複製！';setTimeout(()=>btn.textContent='複製貨號',1500);
  });
}
function applySkuToNew(){
  const code=document.getElementById('sku-preview')?.textContent;
  if(!code||code==='—')return;
  showPage('overview',document.querySelectorAll('.ptab')[0]);
  setTimeout(()=>{openModal();document.getElementById('f-code').value=code;},60);
}

function deleteMat(id){ materialLib=materialLib.filter(m=>m.id!==id); renderMatLib(); refreshQaLibSel(); saveData(); pushConfigToBackend(); }
function openMatPopup(){ editingMatId=null; document.getElementById('mat-popup-title').textContent='新增素材'; document.getElementById('mat-name').value=''; document.getElementById('mat-qty').value=''; document.getElementById('mat-unit').value='個'; document.getElementById('mat-price').value=''; document.getElementById('mat-cur').value='CNY'; document.getElementById('mat-preview').style.display='none'; document.getElementById('mat-popup').classList.add('open'); setTimeout(()=>document.getElementById('mat-name').focus(),80); }
function openMatEdit(id){ const m=materialLib.find(x=>x.id===id);if(!m)return; editingMatId=id; document.getElementById('mat-popup-title').textContent='編輯素材'; document.getElementById('mat-name').value=m.name; document.getElementById('mat-qty').value=m.qty; document.getElementById('mat-unit').value=m.unit; document.getElementById('mat-price').value=m.price; document.getElementById('mat-cur').value=m.currency; updateMatPreview(); document.getElementById('mat-popup').classList.add('open'); }

function updateMatPreview(){ const qty=parseFloat(document.getElementById('mat-qty').value)||0; const price=parseFloat(document.getElementById('mat-price').value)||0; const cur=document.getElementById('mat-cur').value; const unit=document.getElementById('mat-unit').value||'個'; const sym=cur==='CNY'?'¥':'NT$'; const prev=document.getElementById('mat-preview'); if(qty>0&&price>0){prev.style.display='block';prev.textContent=`單位成本：${sym}${(price/qty).toFixed(2)} / ${unit}`;}else{prev.style.display='none';} }

function addCostRow(name='',qty=1,price='',currency='CNY',note=''){

function deleteCostRow(id){ costRows=costRows.filter(r=>r.id!==id); renderCostRows(); }
function renderCostRows(){
  const tbody=document.getElementById('cost-rows');
  if(!tbody)return;
  tbody.innerHTML=costRows.map(row=>`
    <tr style="border-bottom:1px solid var(--border)">
      <td style="padding:7px 12px"><input class="cost-row-inp" id="cr-name-${row.id}" value="${row.name}" placeholder="項目名稱" oninput="updateCostSummary()"></td>
      <td style="padding:7px 8px"><input class="cost-row-inp" id="cr-qty-${row.id}" type="number" value="${row.qty}" min="1" style="width:52px;text-align:center" oninput="updateCostSummary()"></td>
      <td style="padding:7px 8px"><input class="cost-row-inp" id="cr-price-${row.id}" type="number" value="${row.price}" placeholder="0" style="text-align:right" oninput="updateCostSummary()"></td>
      <td style="padding:7px 6px"><select class="cost-cur-sel" id="cr-cur-${row.id}" onchange="updateCostSummary()"><option value="CNY" ${row.currency==='CNY'?'selected':''}>¥</option><option value="TWD" ${row.currency==='TWD'?'selected':''}>NT$</option></select></td>
      <td style="padding:7px 8px;text-align:right;font-weight:700;font-size:13px" id="cr-sub-${row.id}">—</td>
      <td style="padding:7px 8px"><input class="cost-row-inp" id="cr-note-${row.id}" value="${row.note}" placeholder="備註" oninput="updateCostSummary()"></td>
      <td style="padding:7px 6px"><button class="cost-del-btn" onclick="deleteCostRow(${row.id})">✕</button></td>
    </tr>`).join('');
  updateCostSummary();
}
function updateCostSummary(){
  const rate=getRate(); let total=0; const barData=[];
  costRows.forEach(row=>{
    const qty=parseFloat(document.getElementById(`cr-qty-${row.id}`)?.value)||0;
    const price=parseFloat(document.getElementById(`cr-price-${row.id}`)?.value)||0;
    const cur=document.getElementById(`cr-cur-${row.id}`)?.value||'CNY';
    const name=document.getElementById(`cr-name-${row.id}`)?.value||'項目';
    const sub=cur==='CNY'?qty*price*rate:qty*price;
    total+=sub;
    const subEl=document.getElementById(`cr-sub-${row.id}`);
    if(subEl)subEl.textContent=sub>0?'NT$ '+Math.round(sub).toLocaleString():'—';
    if(sub>0)barData.push({name,sub});
  });
  const tw=document.getElementById('cost-total-twd');if(tw)tw.textContent='NT$ '+Math.round(total).toLocaleString();
  const cn=document.getElementById('cost-total-cny');if(cn)cn.textContent=`約 ¥ ${Math.round(total/rate).toLocaleString()}`;
  const barsEl=document.getElementById('cost-breakdown-bars');
  if(barsEl&&barData.length>0){
    const cols=['#6C63FF','#FF6584','#43BCCD','#F7B731','#20BF6B','#FC5C65','#A29BFE'];
    barsEl.innerHTML=barData.map((d,i)=>{
      const pct=total>0?Math.round(d.sub/total*100):0;
      return`<div><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px"><span style="font-weight:600">${d.name}</span><span>NT$ ${Math.round(d.sub).toLocaleString()} (${pct}%)</span></div><div style="height:6px;background:#F0F0F0;border-radius:3px"><div style="height:6px;background:${cols[i%cols.length]};border-radius:3px;width:${pct}%"></div></div></div>`;
    }).join('');
  } else if(barsEl) barsEl.innerHTML='';
  const sell=parseFloat(document.getElementById('cost-sell-price')?.value)||0;
  const profit=document.getElementById('cost-profit');const margin=document.getElementById('cost-margin');const ratio=document.getElementById('cost-ratio');
  if(sell>0){
    const gp=sell-total;const mr=sell>0?Math.round(gp/sell*100):0;const cr=sell>0?Math.round(total/sell*100):0;
    if(profit)profit.textContent=(gp>=0?'NT$ ':'- NT$ ')+Math.abs(Math.round(gp)).toLocaleString();
    if(margin)margin.textContent=mr+'%';
    if(ratio)ratio.textContent=cr+'%';
  } else {
    if(profit)profit.textContent='—';if(margin)margin.textContent='—';if(ratio)ratio.textContent='—';
  }
}

  const headers=['Handle','Title','Body (HTML)','Vendor','Type','Tags','Published','Option1 Name','Option1 Value','Variant Price','Variant SKU'];
  const row=[
    gv('sl-code')||'product',gv('sl-name-zh')||'',gv('sl-desc-zh')||'','Dilute Studio',gv('sl-cat-zh')||'','','true','尺寸','M',gv('sl-price')||'',gv('sl-code')||''
  ];
  const csv=[headers.join(','),row.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')].join('\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download=`shopline_${gv('sl-code')||'product'}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();URL.revokeObjectURL(url);
}
function gv(id){ const el=document.getElementById(id);return el?el.value:''; }

// ═══ INVENTORY PAGE ═══

  const savedUrl = localStorage.getItem('dilute_backend_url')||'';
  document.getElementById('page-inventory').innerHTML=`
    <div style="max-width:900px;margin:0 auto">
      <div style="background:var(--white);border-radius:var(--r);box-shadow:var(--shadow);padding:16px 20px;margin-bottom:14px">
        <div style="font-size:14px;font-weight:700;margin-bottom:4px">🔗 連接後端伺服器（多人共用）</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:10px">連接後，所有人的商品資料、類別、季度設定都會同步</div>
        <div class="inv-conn-row">
          <input class="inv-inp" id="inv-url" placeholder="https://your-backend.railway.app" value="${savedUrl}">
          <button class="inv-btn" style="background:var(--accent);color:#fff" onclick="connectBackend()">連接</button>
          <button class="inv-btn" style="background:#16A34A;color:#fff" onclick="triggerSync()">ShopLine同步</button>
        </div>
        <div id="inv-status" style="margin-top:8px;font-size:12px;color:var(--muted)">${savedUrl?'正在重新連接…':'尚未連接 — 輸入後端網址後按連接'}</div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px">
        <div class="inv-stat-card"><div class="inv-stat-val" id="inv-stat-orders">—</div><div class="inv-stat-lbl">今日訂單</div></div>
        <div class="inv-stat-card"><div class="inv-stat-val" id="inv-stat-revenue">—</div><div class="inv-stat-lbl">今日營收</div></div>
        <div class="inv-stat-card"><div class="inv-stat-val" id="inv-stat-returns">—</div><div class="inv-stat-lbl">今日退貨</div></div>
        <div class="inv-stat-card"><div class="inv-stat-val" id="inv-stat-sku">—</div><div class="inv-stat-lbl">庫存 SKU</div></div>
      </div>
      <div style="background:var(--white);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden">

// backend URL (persisted separately so it survives data resets)
// Auto-detect: if served from Railway, use same origin as backend
const _selfOrigin = (location.hostname !== 'localhost' && location.hostname !== '127.0.0.1' && !location.protocol.startsWith('file'))
  ? location.origin   // served from Railway → use same domain
  : '';
let backendUrl = localStorage.getItem('dilute_backend_url') || _selfOrigin;

function connectBackend(){
  const urlEl=document.getElementById('inv-url');
  const url=(urlEl?.value||backendUrl).trim();
  if(!url){alert('請輸入後端網址');return;}
  backendUrl=url;
  localStorage.setItem('dilute_backend_url',url);
  if(ws){ws.close();}
  const wsUrl=url.replace(/^https/,'wss').replace(/^http/,'ws');
  const setStatus=(msg,color)=>{ const s=document.getElementById('inv-status');if(s){s.textContent=msg;s.style.color=color||'var(--muted)';} };
  try{
    ws=new WebSocket(wsUrl);
    ws.onopen=()=>{ setStatus('✅ 已連接後端，商品資料同步中…','#16A34A'); };
    ws.onmessage=e=>{ try{handleWsMessage(JSON.parse(e.data));}catch{} };
    ws.onclose=()=>{ setStatus('⚠ 連線中斷，重新整理頁面後會自動重連','#EA580C'); };
    ws.onerror=()=>{ setStatus('❌ 連線失敗，請確認網址是否正確','#DC2626'); };
  }catch(e){ setStatus('❌ '+e.message,'#DC2626'); }
}

function handleWsMessage(msg){
  if(msg.type==='snapshot'||msg.type==='sync_done'){
    // inventory / orders
    if(msg.payload.inventory) invData=msg.payload.inventory;
    if(msg.payload.orders)    ordersData=msg.payload.orders;
    if(msg.payload.returns)   returnsData=msg.payload.returns;
    renderInvTable(); updateInvStats(msg.payload.stats);
    // product data from backend (overrides localStorage)
    if(msg.payload.items && msg.payload.items.length>0){
      items = msg.payload.items;
      const maxId = Math.max(...items.map(i=>i.id||0));
      if(maxId>=nextId) nextId=maxId+1;
    }
    if(msg.payload.config){
      const cfg=msg.payload.config;
      if(cfg.SEASONS)      SEASONS      = cfg.SEASONS;
      if(cfg.CATS)         CATS         = cfg.CATS;
      if(cfg.skuColors)    skuColors    = cfg.skuColors;
      if(cfg.skuSuppliers) skuSuppliers = cfg.skuSuppliers;
      if(cfg.skuDesigners) skuDesigners = cfg.skuDesigners;
      if(cfg.skuYears)     skuYears     = cfg.skuYears;
      if(cfg.skuSeasons)   skuSeasons   = cfg.skuSeasons;
      if(cfg.staffList)    staffList    = cfg.staffList;
      if(cfg.costPresets)  costPresets  = cfg.costPresets;
      if(cfg.materialLib)  materialLib  = cfg.materialLib;
    }
    if(currentPage==='overview'){ renderSeasonChips();renderCatChips();renderOverview(); }
    const s=document.getElementById('inv-status');
    if(s){s.textContent='✅ 已連接，資料已同步（'+new Date().toLocaleTimeString()+'）';s.style.color='#16A34A';}
  }
  if(msg.type==='item_update'){
    const {item,id,action}=msg.payload;
    if(action==='delete') items=items.filter(i=>i.id!==id);
    else if(item){ const idx=items.findIndex(i=>i.id===item.id); if(idx>=0)items[idx]=item;else items.push(item); }
    if(currentPage==='overview') renderOverview();
  }
  if(msg.type==='config_update'){
    const cfg=msg.payload;
    if(cfg.SEASONS)SEASONS=cfg.SEASONS;if(cfg.CATS)CATS=cfg.CATS;
    if(cfg.skuColors)skuColors=cfg.skuColors;if(cfg.skuSuppliers)skuSuppliers=cfg.skuSuppliers;
    if(cfg.skuDesigners)skuDesigners=cfg.skuDesigners;if(cfg.staffList)staffList=cfg.staffList;
    if(cfg.costPresets)costPresets=cfg.costPresets;if(cfg.materialLib)materialLib=cfg.materialLib;
    if(currentPage==='overview'){renderSeasonChips();renderCatChips();renderOverview();}
  }
  if(msg.type==='inventory_update'&&msg.payload.inventory){ invData=msg.payload.inventory; renderInvTable(); }
  if(msg.type==='order_update'){ if(msg.payload.stats)updateInvStats(msg.payload.stats); }
  if(msg.type==='sync_progress'){ const s=document.getElementById('inv-status');if(s)s.textContent='🔄 '+msg.payload.message; }
}

function updateInvStats(stats){
  if(!stats)return;
  const o=stats.orders||{};const r=stats.returns||{};
  const setStat=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  setStat('inv-stat-orders',o.today_count||0);
  setStat('inv-stat-revenue',o.today_revenue?'NT$'+(o.today_revenue).toLocaleString():'—');
  setStat('inv-stat-returns',r.today_count||0);
  setStat('inv-stat-sku',invData.length||'—');
}

function renderInvTable(){
  const wrap=document.getElementById('inv-table-wrap');
  if(!wrap)return;
  if(!invData.length){wrap.innerHTML='<div style="padding:20px;text-align:center;color:var(--muted)">無庫存資料</div>';return;}
  wrap.innerHTML=`<table class="data-table">
    <thead><tr><th>SKU</th><th>商品名稱</th><th>顏色/尺寸</th><th style="text-align:right">庫存</th></tr></thead>
    <tbody>${invData.map(row=>`<tr>
      <td style="font-family:monospace;font-size:12px">${row.variant_id||''}</td>
      <td>${row.product_title||''}</td>
      <td>${[row.color,row.size].filter(Boolean).join(' / ')||row.option1||''}</td>
      <td style="text-align:right;font-weight:700;color:${(row.quantity||0)<5?'#DC2626':'var(--text)'}">${row.quantity||0}</td>
    </tr>`).join('')}</tbody>
  </table>`;
}

function triggerSync(){
  const url=document.getElementById('inv-url')?.value.trim();
  if(!url){alert('請先輸入後端網址');return;}
  fetch(url+'/api/sync',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({})})
    .then(r=>r.json()).then(d=>{ const s=document.getElementById('inv-status');if(s)s.textContent='🔄 同步中…'; })
    .catch(e=>{ const s=document.getElementById('inv-status');if(s)s.textContent='❌ '+e.message; });
}

// ═══ LOCALSTORAGE PERSISTENCE ═══
const STORE_KEY = 'dilute_studio_v1';

function exportData(){
  const data = JSON.stringify({
    items, nextId, SEASONS, CATS,
    skuColors, skuSuppliers, skuDesigners, skuSeasons, skuYears,
    staffList, costPresets, materialLib, matLibId,
  }, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'dilute-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}

function importData(e){
  const file = e.target.files[0];
  if(!file) return;
  if(!confirm('匯入後會覆蓋現有資料，確定嗎？')) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if(d.items)        items        = d.items;
      if(d.nextId)       nextId       = d.nextId;
      if(d.SEASONS)      SEASONS      = d.SEASONS;
      if(d.CATS)         CATS         = d.CATS;
      if(d.skuColors)    skuColors    = d.skuColors;
      if(d.skuSuppliers) skuSuppliers = d.skuSuppliers;
      if(d.skuDesigners) skuDesigners = d.skuDesigners;
      if(d.skuSeasons)   skuSeasons   = d.skuSeasons;
      if(d.skuYears)     skuYears     = d.skuYears;
      if(d.staffList)    staffList    = d.staffList;
      if(d.costPresets)  costPresets  = d.costPresets;
      if(d.materialLib)  materialLib  = d.materialLib;
      if(d.matLibId)     matLibId     = d.matLibId;
      saveData();
      renderSeasonChips(); renderCatChips(); renderOverview();
      alert('匯入成功！');
    } catch(err){ alert('檔案格式錯誤，請確認是正確的備份檔'); }
  };
  reader.readAsText(file);
  e.target.value='';
}

function saveData(){
  // always save to localStorage as backup
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify({
      items, nextId,
      SEASONS, CATS,
      skuColors, skuSuppliers, skuDesigners, skuSeasons, skuYears,
      staffList, costPresets, materialLib, matLibId,
    }));
  } catch(e){ console.warn('localStorage 儲存失敗', e); }
}

// Push a single item to backend
function pushItemToBackend(item){
  if(!backendUrl) return;
  fetch(`${backendUrl}/api/items/${item.id}`,{
    method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(item)
  }).catch(()=>{});
}

// Push deleted item to backend
function deleteItemFromBackend(id){
  if(!backendUrl) return;
  fetch(`${backendUrl}/api/items/${id}`,{method:'DELETE'}).catch(()=>{});
}

// Push config to backend
function pushConfigToBackend(){
  if(!backendUrl) return;
  const cfg={SEASONS,CATS,skuColors,skuSuppliers,skuDesigners,skuYears,skuSeasons,staffList,costPresets,materialLib};
  fetch(`${backendUrl}/api/config`,{
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(cfg)
  }).catch(()=>{});
}

function loadData(){
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if(!raw) return;
    const d = JSON.parse(raw);
    if(d.items)       items        = d.items;
    if(d.nextId)      nextId       = d.nextId;
    if(d.SEASONS)     SEASONS      = d.SEASONS;
    if(d.CATS)        CATS         = d.CATS;
    if(d.skuColors)   skuColors    = d.skuColors;
    if(d.skuSuppliers)skuSuppliers = d.skuSuppliers;
    if(d.skuDesigners)skuDesigners = d.skuDesigners;
    if(d.skuSeasons)  skuSeasons   = d.skuSeasons;
    if(d.skuYears)    skuYears     = d.skuYears;
    if(d.staffList)   staffList    = d.staffList;
    if(d.costPresets) costPresets  = d.costPresets;
    if(d.materialLib) materialLib  = d.materialLib;
    if(d.matLibId)    matLibId     = d.matLibId;
  } catch(e){ console.warn('讀取失敗', e); }
}

// ═══ INIT ═══
loadData();
renderSeasonChips();
renderCatChips();
renderOverview();
// auto-connect backend if URL was saved
if(backendUrl){ setTimeout(connectBackend, 800); }
</script>
